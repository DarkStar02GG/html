<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>第一人称射击 - 音效完整版</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;user-select:none;-webkit-tap-highlight-color:transparent}
        body{background:#000;width:100vw;height:100vh;height:100dvh;overflow:hidden;position:fixed;top:0;left:0;touch-action:none}
        canvas{display:block;position:fixed;top:0;left:0;z-index:1;touch-action:none}
        .divider{position:fixed;top:0;left:50%;width:1px;height:100%;border-left:1px dashed rgba(255,255,255,0.08);pointer-events:none;z-index:5}
        .joystick-zone{position:fixed;bottom:30px;left:20px;width:130px;height:130px;z-index:10;touch-action:none}
        .joystick-base{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:100px;height:100px;border-radius:50%;background:rgba(255,255,255,0.06);border:2px solid rgba(255,255,255,0.2)}
        .joystick-thumb{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:45px;height:45px;border-radius:50%;background:rgba(255,255,255,0.25);border:2px solid rgba(255,255,255,0.45)}
        .btn-jump{position:fixed;bottom:100px;right:30px;width:70px;height:70px;border-radius:50%;background:rgba(255,200,50,0.2);border:2px solid rgba(255,200,50,0.45);color:#ffc832;font-size:14px;font-weight:bold;display:flex;align-items:center;justify-content:center;z-index:10;touch-action:none}
        .btn-jump:active{background:rgba(255,200,50,0.5)}
        .btn-slide{position:fixed;bottom:30px;right:30px;width:70px;height:70px;border-radius:50%;background:rgba(100,200,255,0.2);border:2px solid rgba(100,200,255,0.45);color:#88ccff;font-size:14px;font-weight:bold;display:flex;align-items:center;justify-content:center;z-index:10;touch-action:none}
        .btn-slide:active{background:rgba(100,200,255,0.5)}
        .btn-aim{position:fixed;bottom:175px;right:30px;width:70px;height:70px;border-radius:50%;background:rgba(255,50,50,0.2);border:2px solid rgba(255,50,50,0.45);color:#ff5555;font-size:12px;font-weight:bold;display:flex;align-items:center;justify-content:center;z-index:10;touch-action:none}
        .btn-aim:active{background:rgba(255,50,50,0.5)}
        #crosshair { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 25; pointer-events: none; color: rgba(255, 255, 255, 0.9); font-size: 30px; font-weight: 100; font-family: monospace; text-shadow: 0 0 5px rgba(0,0,0,0.8); }
        #ammoHUD { position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%); z-index: 30; color: #fff; font-size: 22px; font-weight: bold; font-family: monospace; text-shadow: 0 0 10px rgba(0,0,0,0.8); pointer-events: none; background: rgba(0,0,0,0.5); padding: 5px 25px; border-radius: 25px; border: 1px solid rgba(255,255,255,0.2); }
        #loadingText { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 999; color: #fff; font-size: 18px; font-family: sans-serif; background: rgba(0,0,0,0.8); padding: 15px 30px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.2); pointer-events: none; transition: opacity 0.5s; }
        
        /* 🟢 伤害与击杀提示动画 */
        #damageIndictor { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 20; pointer-events: none; color: #ff3333; font-size: 40px; font-weight: bold; font-family: sans-serif; opacity: 0; transition: all 0.1s; text-shadow: 0 0 20px rgba(255,0,0,0.8); }
        #killIndicator { position: fixed; top: 40%; left: 50%; transform: translate(-50%, -50%); z-index: 20; pointer-events: none; color: #ffaa00; font-size: 35px; font-weight: bold; font-family: sans-serif; opacity: 0; transition: all 0.2s; text-shadow: 0 0 30px rgba(255,170,0,0.8); }
        .indicator-show { opacity: 1 !important; transform: translate(-50%, -70%) !important; }
    </style>
</head>
<body>
    <div id="loadingText">⏳ 正在加载战斗资源...</div>
    <div id="damageIndictor">💥 -25</div>
    <div id="killIndicator">☠️ 击杀 +100</div>

    <div class="divider"></div>
    <div id="crosshair">+</div>
    <div id="ammoHUD">🔫 9999999</div>

    <div class="joystick-zone" id="joystickZone">
        <div class="joystick-base"></div>
        <div class="joystick-thumb" id="joystickThumb"></div>
    </div>
    <button class="btn-jump" id="jumpBtn">🦘</button>
    <button class="btn-slide" id="slideBtn">🤸</button>
    <button class="btn-aim" id="aimBtn">🎯</button>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" } }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { RGBELoader } from 'three/addons/loaders/RGBELoader.js';

        // ==================== 🟢 音效系统 ====================
        const audioContext = new (window.AudioContext || window.webkitAudioContext)();

        function playSound(freq, duration, type='sine', volume=0.3) {
            try {
                const osc = audioContext.createOscillator();
                const gain = audioContext.createGain();
                osc.type = type;
                osc.frequency.value = freq;
                gain.gain.setValueAtTime(volume, audioContext.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + duration);
                osc.connect(gain);
                gain.connect(audioContext.destination);
                osc.start();
                osc.stop(audioContext.currentTime + duration);
            } catch(e) {}
        }

        function playHitSound() { playSound(800, 0.1, 'square', 0.2); }
        function playKillSound() { playSound(600, 0.1, 'sawtooth', 0.4); setTimeout(() => playSound(900, 0.15, 'sawtooth', 0.3), 100); }
        function playFireSound() { playSound(150, 0.05, 'sawtooth', 0.3); }

        // ==================== 🟢 UI 反馈系统 ====================
        const dmgEl = document.getElementById('damageIndictor');
        const killEl = document.getElementById('killIndicator');
        let dmgTimer = null, killTimer = null;

        function showDamage(dmg) {
            dmgEl.textContent = `💥 -${dmg}`;
            dmgEl.classList.add('indicator-show');
            clearTimeout(dmgTimer);
            dmgTimer = setTimeout(() => dmgEl.classList.remove('indicator-show'), 200);
        }

        function showKill() {
            killEl.textContent = `☠️ 击杀 +100`;
            killEl.classList.add('indicator-show');
            clearTimeout(killTimer);
            killTimer = setTimeout(() => killEl.classList.remove('indicator-show'), 800);
        }

        // ==================== 🟢 场景渲染 ====================
        const scene = new THREE.Scene();
        scene.background = new THREE.Color('#12121f');
        scene.fog = new THREE.Fog('#12121f', 8, 40);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.05, 100);
        camera.position.set(0, 1.6, 0);
        camera.rotation.order = 'YXZ';
        scene.add(camera);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.2;
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.outputColorSpace = THREE.SRGBColorSpace;
        document.body.appendChild(renderer.domElement);

        const rgbeLoader = new RGBELoader();
        rgbeLoader.load('https://threejs.org/examples/textures/equirectangular/venice_sunset_1k.hdr', (texture) => {
            texture.mapping = THREE.EquirectangularReflectionMapping;
            scene.environment = texture;
        });

        const sun = new THREE.DirectionalLight('#ffffff', 2.5);
        sun.position.set(5, 15, 8);
        sun.castShadow = true;
        sun.shadow.mapSize.width = 2048;
        sun.shadow.mapSize.height = 2048;
        sun.shadow.camera.near = 0.5;
        sun.shadow.camera.far = 30;
        const d = 15;
        sun.shadow.camera.left = -d; sun.shadow.camera.right = d;
        sun.shadow.camera.top = d; sun.shadow.camera.bottom = -d;
        scene.add(sun);

        const fillLight = new THREE.DirectionalLight('#88aacc', 0.6);
        fillLight.position.set(-5, 0, 10);
        scene.add(fillLight);

        const ambient = new THREE.AmbientLight('#404060', 0.4);
        scene.add(ambient);

        // 地面
        const invisibleFloor = new THREE.Mesh(new THREE.PlaneGeometry(80, 80), new THREE.MeshBasicMaterial({ transparent: true, opacity: 0 }));
        invisibleFloor.rotation.x = -Math.PI / 2;
        invisibleFloor.position.y = 0;
        scene.add(invisibleFloor);

        const gridFloor = new THREE.Mesh(new THREE.PlaneGeometry(80, 80), new THREE.MeshStandardMaterial({ color: '#333344', roughness: 0.8 }));
        gridFloor.rotation.x = -Math.PI / 2;
        gridFloor.position.y = -10.0; 
        gridFloor.receiveShadow = true;
        scene.add(gridFloor);
        const gridHelper = new THREE.GridHelper(80, 80, '#444455', '#222233');
        gridHelper.position.y = -10.0;
        scene.add(gridHelper);

        // ===== 15米巨人 =====
        const enemyMat = new THREE.MeshStandardMaterial({ color: '#44aa88', roughness: 0.6 });
        const enemies = [];
        const raycaster = new THREE.Raycaster();

        function createEnemy(index) {
            const group = new THREE.Group();
            const torso = new THREE.Mesh(new THREE.BoxGeometry(5, 7.5, 3.5), enemyMat);
            torso.position.y = 3.75;
            torso.castShadow = true; torso.receiveShadow = true;
            group.add(torso);

            const head = new THREE.Mesh(new THREE.SphereGeometry(1.5, 8, 8), new THREE.MeshStandardMaterial({ color: '#ffccaa', roughness: 0.3 }));
            head.position.y = 10.0;
            head.castShadow = true; head.receiveShadow = true;
            head.userData.bodyPart = 'head';
            group.add(head);

            const armL = new THREE.Mesh(new THREE.BoxGeometry(1.0, 6.0, 1.0), enemyMat);
            armL.position.set(-3.5, 3.75, 0);
            armL.castShadow = true; armL.receiveShadow = true;
            group.add(armL);

            const armR = new THREE.Mesh(new THREE.BoxGeometry(1.0, 6.0, 1.0), enemyMat);
            armR.position.set(3.5, 3.75, 0);
            armR.castShadow = true; armR.receiveShadow = true;
            group.add(armR);

            const legL = new THREE.Mesh(new THREE.BoxGeometry(1.5, 7.0, 1.5), enemyMat);
            legL.position.set(-1.5, -3.5, 0);
            legL.castShadow = true; legL.receiveShadow = true;
            group.add(legL);

            const legR = new THREE.Mesh(new THREE.BoxGeometry(1.5, 7.0, 1.5), enemyMat);
            legR.position.set(1.5, -3.5, 0);
            legR.castShadow = true; legR.receiveShadow = true;
            group.add(legR);

            group.userData = { isEnemy: true, hp: 100, maxHp: 100, index: index, isDead: false, deathTimer: 0, resetTimer: 0, torso: torso, head: head, legL: legL, legR: legR };

            const angle = Math.random() * Math.PI * 2;
            const radius = 5 + Math.random() * 10;
            group.position.set(Math.cos(angle) * radius, -10.0 + 7.5, Math.sin(angle) * radius);
            group.rotation.y = Math.random() * Math.PI * 2;

            const canvas = document.createElement('canvas');
            canvas.width = 256; canvas.height = 64;
            const ctx = canvas.getContext('2d');
            const hpSpriteMat = new THREE.CanvasTexture(canvas);
            const hpSprite = new THREE.Sprite(new THREE.SpriteMaterial({ map: hpSpriteMat, depthTest: false }));
            hpSprite.scale.set(10, 2, 1);
            hpSprite.position.y = 15.0; 
            group.add(hpSprite);
            
            group.userData.hpCanvas = canvas; group.userData.hpCtx = ctx;
            group.userData.hpSprite = hpSprite; group.userData.hpTexture = hpSpriteMat;

            group.userData.updateHP = function() {
                const hp = this.hp / this.maxHp;
                const ctx = this.hpCtx; const canvas = this.hpCanvas;
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = '#333'; ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = hp > 0.5 ? '#44ff44' : (hp > 0.25 ? '#ffaa00' : '#ff3333');
                ctx.fillRect(2, 2, (canvas.width - 4) * Math.max(0, hp), canvas.height - 4);
                this.hpTexture.needsUpdate = true;
            };
            group.userData.updateHP();

            scene.add(group);
            enemies.push(group);
            return group;
        }
        for (let i = 0; i < 10; i++) createEnemy(i);

        // ===== 特效系统 =====
        const bulletHoles = []; const muzzleFlashes = []; const bulletTrails = [];
        const holeMat = new THREE.MeshStandardMaterial({ color: 0x222222, roughness: 0.9, metalness: 0.1 });

        function createBulletHit(pos, normal) {
            if (bulletHoles.length >= 20) {
                const old = bulletHoles.shift(); scene.remove(old);
                old.geometry.dispose(); old.material.dispose();
            }
            const hole = new THREE.Mesh(new THREE.CircleGeometry(0.06, 6), holeMat);
            hole.position.copy(pos).add(normal.clone().multiplyScalar(0.02));
            hole.lookAt(pos.clone().add(normal));
            scene.add(hole);
            hole.userData.lifeTime = 5.0;
            bulletHoles.push(hole);
        }

        function createMuzzleFlash(pos, dir) {
            const flashGroup = new THREE.Group();
            const coreMat = new THREE.SpriteMaterial({ map: new THREE.CanvasTexture(generateSparkTexture()), transparent: true, opacity: 1, blending: THREE.AdditiveBlending });
            const core = new THREE.Sprite(coreMat);
            core.scale.set(0.4, 0.4, 1);
            flashGroup.add(core);

            for (let i = 0; i < 5; i++) {
                const size = 0.15 + Math.random() * 0.2;
                const mat = new THREE.SpriteMaterial({ map: new THREE.CanvasTexture(generateSparkTexture()), transparent: true, opacity: 0.8, blending: THREE.AdditiveBlending });
                const sprite = new THREE.Sprite(mat);
                const angle = Math.random() * Math.PI * 2;
                const radius = 0.15 + Math.random() * 0.1;
                sprite.position.set(Math.cos(angle) * radius, Math.sin(angle) * radius, Math.random() * 0.1);
                sprite.scale.set(size, size, 1);
                flashGroup.add(sprite);
            }
            flashGroup.position.copy(pos);
            flashGroup.lookAt(pos.clone().add(dir));
            scene.add(flashGroup);
            flashGroup.userData.lifeTime = 0.1;
            muzzleFlashes.push(flashGroup);
        }

        function generateSparkTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 32; canvas.height = 32;
            const ctx = canvas.getContext('2d');
            const gradient = ctx.createRadialGradient(16, 16, 0, 16, 16, 16);
            gradient.addColorStop(0, 'rgba(255, 255, 200, 1)');
            gradient.addColorStop(0.2, 'rgba(255, 200, 100, 1)');
            gradient.addColorStop(0.6, 'rgba(255, 100, 20, 0.8)');
            gradient.addColorStop(1, 'rgba(255, 0, 0, 0)');
            ctx.fillStyle = gradient; ctx.fillRect(0, 0, 32, 32);
            return canvas;
        }

        function createBulletTrail(start, end) {
            const points = []; const steps = 20;
            for (let i = 0; i <= steps; i++) {
                const t = i / steps; const p = new THREE.Vector3().lerpVectors(start, end, t);
                points.push(p);
            }
            const geo = new THREE.BufferGeometry().setFromPoints(points);
            const mat = new THREE.LineBasicMaterial({ color: 0xffdd44, transparent: true, opacity: 0.9 });
            const line = new THREE.Line(geo, mat);
            scene.add(line);
            line.userData.lifeTime = 0.15;
            bulletTrails.push(line);
        }

        // ===== 核心逻辑 =====
        const handGroup = new THREE.Group();
        camera.add(handGroup);
        handGroup.position.set(0.25, -0.35, -0.6);

        const state = {
            moveX: 0, moveZ: 0, baseSpeed: 15, currentSpeed: 15, baseSpeedAim: 7.5,
            eulerX: 0, eulerY: 0, jumpVel: 0, isGrounded: true,
            isSliding: false, slideDistance: 0, slideMaxDistance: 20,
            slideCooldown: 0, bobTimer: 0, slideDirX: 0, slideDirZ: 0,
            currentCamY: 1.6, targetCamY: 1.6, currentTilt: 0, targetTilt: 0,
            currentFOV: 75, targetFOV: 75,
            isSlideJumping: false, slideJumpTime: 0, slideJumpDuration: 0.8,
            slideJumpStartY: 0, slideJumpStartX: 0, slideJumpStartZ: 0,
            slideJumpDirX: 0, slideJumpDirZ: 0, slideJumpMaxHeight: 2.0,
            isAiming: false, aimTransitionTime: 0, aimDuration: 0.1,
            currentScale: 0.03, currentX: 0.00, currentY: -0.35, currentZ: 0.20, 
            currentRotX: 0.01, currentRotY: -3.14, currentRotZ: 0.01,
            targetScale: 0.03, targetX: 0.00, targetY: -0.35, targetZ: 0.20, 
            targetRotX: 0.01, targetRotY: -3.14, targetRotZ: 0.01,
            fireCooldown: 0,
            fireRate: 0.08,
        };

        const lookSensitivity = 0.013;
        const gyroSensitivity = 0;

        // 摇杆
        const joystickZone = document.getElementById('joystickZone');
        const joystickThumb = document.getElementById('joystickThumb');
        let jsActive = false, jsId = null;

        joystickZone.addEventListener('pointerdown', e => {
            e.preventDefault(); e.stopPropagation();
            jsActive = true; jsId = e.pointerId;
            joystickZone.setPointerCapture(e.pointerId);
        });

        joystickZone.addEventListener('pointermove', e => {
            if (!jsActive || e.pointerId !== jsId) return;
            e.preventDefault(); e.stopPropagation();
            const rect = joystickZone.getBoundingClientRect();
            const cx = rect.left + rect.width / 2, cy = rect.top + rect.height / 2;
            let dx = e.clientX - cx, dy = e.clientY - cy;
            const maxR = 40, dist = Math.hypot(dx, dy);
            if (dist > maxR) { dx = (dx / dist) * maxR; dy = (dy / dist) * maxR; }
            joystickThumb.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
            state.moveX = dx / maxR;
            state.moveZ = dy / maxR;
        });

        joystickZone.addEventListener('pointerup', e => {
            if (e.pointerId !== jsId) return;
            jsActive = false; jsId = null;
            state.moveX = 0; state.moveZ = 0;
            joystickThumb.style.transform = 'translate(-50%, -50%)';
        });

        // 陀螺仪
        if (window.DeviceOrientationEvent) {
            if (typeof DeviceOrientationEvent.requestPermission === 'function') {
                DeviceOrientationEvent.requestPermission().then(state => {
                    if (state === 'granted') {
                        window.addEventListener('deviceorientation', handleOrientation);
                    }
                }).catch(console.error);
            } else {
                window.addEventListener('deviceorientation', handleOrientation);
            }
        }

        let initialBeta = null, initialGamma = null;
        function handleOrientation(event) {
            if (event.beta === null || event.gamma === null) return;
            if (initialBeta === null) { initialBeta = event.beta; initialGamma = event.gamma; return; }
            let deltaBeta = (event.beta - initialBeta) * gyroSensitivity;
            let deltaGamma = (event.gamma - initialGamma) * gyroSensitivity;
            deltaBeta = Math.max(-Math.PI / 3, Math.min(Math.PI / 3, deltaBeta));
            state.eulerX = Math.max(-Math.PI / 3, Math.min(Math.PI / 3, state.eulerX + deltaBeta * 0.01));
            state.eulerY += deltaGamma * 0.01;
        }

        // 视角滑动
        let viewActive = false, viewId = null, lvx = 0, lvy = 0;
        document.addEventListener('pointerdown', e => {
            if (e.clientX > window.innerWidth * 0.35 && !viewActive) {
                viewActive = true; viewId = e.pointerId; lvx = e.clientX; lvy = e.clientY;
            }
        });
        document.addEventListener('pointermove', e => {
            if (!viewActive || e.pointerId !== viewId) return;
            state.eulerY -= (e.clientX - lvx) * lookSensitivity;
            state.eulerX -= (e.clientY - lvy) * lookSensitivity;
            state.eulerX = Math.max(-Math.PI / 3, Math.min(Math.PI / 3, state.eulerX));
            lvx = e.clientX; lvy = e.clientY;
        });
        document.addEventListener('pointerup', e => { if (e.pointerId === viewId) { viewActive = false; viewId = null; } });
        renderer.domElement.addEventListener('click', () => { renderer.domElement.requestPointerLock(); });
        document.addEventListener('mousemove', e => {
            if (document.pointerLockElement === renderer.domElement) {
                state.eulerY -= e.movementX * lookSensitivity;
                state.eulerX -= e.movementY * lookSensitivity;
                state.eulerX = Math.max(-Math.PI / 3, Math.min(Math.PI / 3, state.eulerX));
            }
        });

        // 举镜按钮
        const aimBtn = document.getElementById('aimBtn');
        aimBtn.addEventListener('pointerdown', e => {
            e.preventDefault(); 
            state.isAiming = true;
            state.aimTransitionTime = 0;
            state.targetScale = 0.03; state.targetX = -0.255; state.targetY = -0.205; state.targetZ = 0.60;
            state.targetRotX = 0.01; state.targetRotY = -3.14; state.targetRotZ = 0.01;
            state.fireCooldown = 0;
        });
        aimBtn.addEventListener('pointerup', e => {
            e.preventDefault(); 
            state.isAiming = false;
            state.aimTransitionTime = 0;
            state.targetScale = 0.03; state.targetX = 0.00; state.targetY = -0.35; state.targetZ = 0.20;
            state.targetRotX = 0.01; state.targetRotY = -3.14; state.targetRotZ = 0.01;
        });

        // 跳跃/滑铲
        document.getElementById('jumpBtn').addEventListener('pointerdown', e => {
            e.preventDefault(); e.stopPropagation();
            if (state.isSliding) {
                state.isSliding = false; state.isSlideJumping = true;
                state.slideJumpTime = 0; state.slideJumpStartY = camera.position.y;
                state.slideJumpStartX = camera.position.x; state.slideJumpStartZ = camera.position.z;
                state.slideJumpDirX = state.slideDirX; state.slideJumpDirZ = state.slideDirZ;
                state.targetTilt = 0.05; return;
            }
            if (!state.isGrounded) return;
            state.jumpVel = 7.5; state.isGrounded = false;
        });

        document.getElementById('slideBtn').addEventListener('pointerdown', e => {
            e.preventDefault(); e.stopPropagation();
            if (!state.isGrounded || state.isSliding || state.slideCooldown > 0 || state.isSlideJumping) return;
            state.isSliding = true; state.slideDistance = 0; state.slideCooldown = 0.3;
            state.targetTilt = 0.18; state.targetCamY = 0.35;
            const fwd = new THREE.Vector3(); camera.getWorldDirection(fwd);
            fwd.y = 0; fwd.normalize();
            state.slideDirX = fwd.x; state.slideDirZ = fwd.z;
            state.currentSpeed = state.baseSpeed * 2.5; state.targetFOV = 110;
        });

        // ===== 🟢 开火逻辑 =====
        function performFire() {
            if (!state.isAiming || state.aimTransitionTime < state.aimDuration) return;

            const centerPos = new THREE.Vector3(0, -0.1, -0.5);
            centerPos.applyQuaternion(camera.quaternion);
            const muzzlePos = camera.position.clone().add(centerPos);
            const forward = new THREE.Vector3(0, 0, -1);
            forward.applyQuaternion(camera.quaternion);

            createMuzzleFlash(muzzlePos, forward);
            playFireSound();
            state.eulerX += 0.03;

            const centerX = window.innerWidth / 2;
            const centerY = window.innerHeight / 2;
            raycaster.setFromCamera(new THREE.Vector2(
                (centerX / window.innerWidth) * 2 - 1,
                -(centerY / window.innerHeight) * 2 + 1
            ), camera);

            const targets = [];
            enemies.forEach(enemy => {
                if (enemy.userData.isDead) return;
                enemy.children.forEach(child => { if (child.isMesh) targets.push(child); });
            });
            targets.push(gridFloor);

            const intersects = raycaster.intersectObjects(targets);

            if (intersects.length > 0) {
                const hit = intersects[0];
                const hitObj = hit.object;
                const point = hit.point;
                const normal = hit.face.normal.clone();
                normal.transformDirection(hitObj.matrixWorld);

                createBulletTrail(muzzlePos, point);
                if (hitObj === gridFloor) createBulletHit(point, normal);

                let parentGroup = null;
                let obj = hitObj;
                while (obj.parent) {
                    if (obj.parent.userData && obj.parent.userData.isEnemy) {
                        parentGroup = obj.parent; break;
                    }
                    obj = obj.parent;
                }

                if (parentGroup && !parentGroup.userData.isDead) {
                    const part = hitObj.userData.bodyPart || 'torso';
                    let damage = 0;
                    if (part === 'head') damage = 100;
                    else if (part === 'torso') damage = 25;
                    else damage = 15;

                    const data = parentGroup.userData;
                    data.hp = Math.max(0, data.hp - damage);
                    data.updateHP();

                    playHitSound();
                    showDamage(damage);

                    if (data.hp <= 0 && !data.isDead) {
                        data.isDead = true; data.deathTimer = 0;
                        playKillSound();
                        showKill();
                        const dir = Math.random() > 0.5 ? -1 : 1;
                        parentGroup.userData.ragdollDir = dir;
                        parentGroup.userData.ragdollTimer = 0;
                    }
                }
            } else {
                const farPoint = new THREE.Vector3(0, 0, -100);
                farPoint.applyQuaternion(camera.quaternion);
                farPoint.add(camera.position);
                createBulletTrail(muzzlePos, farPoint);
            }
        }

        // ==================== 🟢 模型加载器 ====================
        const loader = new GLTFLoader();
        const loadingText = document.getElementById('loadingText');

        // 二合一自动判断路径
        let modelUrl = '';
        if (window.location.protocol === 'file:') {
            modelUrl = "file:///storage/emulated/0/Android/data/mark.via/cache/content/fps_smg9_animated.glb";
        } else {
            modelUrl = "./fps_smg9_animated.glb";
        }

        console.log('正在加载模型:', modelUrl);

        loader.load(modelUrl, function (gltf) {
            while (handGroup.children.length > 0) handGroup.remove(handGroup.children[0]);
            gltf.scene.traverse((child) => {
                if (child.isMesh) { child.castShadow = true; child.receiveShadow = true; }
            });
            
            const initScale = 0.03; const initX = 0.00; const initY = -0.35; const initZ = 0.20;
            const initRotX = 0.01; const initRotY = -3.14; const initRotZ = 0.01;
            state.currentScale = initScale; state.currentX = initX; state.currentY = initY; state.currentZ = initZ;
            state.currentRotX = initRotX; state.currentRotY = initRotY; state.currentRotZ = initRotZ;
            state.targetScale = initScale; state.targetX = initX; state.targetY = initY; state.targetZ = initZ;
            state.targetRotX = initRotX; state.targetRotY = initRotY; state.targetRotZ = initRotZ;
            
            gltf.scene.scale.setScalar(initScale); 
            gltf.scene.position.set(initX, initY, initZ);
            gltf.scene.rotation.set(initRotX, initRotY, initRotZ);
            handGroup.add(gltf.scene);
            
            loadingText.style.opacity = '0';
            setTimeout(() => loadingText.style.display = 'none', 500);
            console.log('✅ 模型加载成功！');
        }, function (xhr) {
            // 下载进度条
            const percent = Math.round((xhr.loaded / xhr.total) * 100);
            loadingText.textContent = `⏳ 加载中 ${percent}%`;
        }, function (error) {
            loadingText.textContent = '❌ 加载失败，请检查网络';
            loadingText.style.color = '#ff5555';
            console.error('加载失败:', error);
        });

        // ===== 游戏循环 =====
        const clock = new THREE.Clock();

        function update(dt) {
            dt = Math.min(dt, 0.1);
            const moving = Math.abs(state.moveX) > 0.05 || Math.abs(state.moveZ) > 0.05;

            if (state.isAiming || state.aimTransitionTime < state.aimDuration) {
                state.aimTransitionTime += dt;
                const p = Math.min(state.aimTransitionTime / state.aimDuration, 1.0);
                const ease = 1 - Math.pow(1 - p, 3);
                state.currentScale += (state.targetScale - state.currentScale) * ease;
                state.currentX += (state.targetX - state.currentX) * ease;
                state.currentY += (state.targetY - state.currentY) * ease;
                state.currentZ += (state.targetZ - state.currentZ) * ease;
                state.currentRotX += (state.targetRotX - state.currentRotX) * ease;
                state.currentRotY += (state.targetRotY - state.currentRotY) * ease;
                state.currentRotZ += (state.targetRotZ - state.currentRotZ) * ease;
            }
            if (handGroup.children.length > 0) {
                const model = handGroup.children[0];
                model.scale.setScalar(state.currentScale);
                model.position.set(state.currentX, state.currentY, state.currentZ);
                model.rotation.set(state.currentRotX, state.currentRotY, state.currentRotZ);
            }

            if (state.isAiming && state.aimTransitionTime >= state.aimDuration) {
                state.fireCooldown -= dt;
                if (state.fireCooldown <= 0) {
                    performFire();
                    state.fireCooldown = state.fireRate;
                }
            } else {
                state.fireCooldown = 0;
            }

            for (let i = bulletHoles.length - 1; i >= 0; i--) {
                const h = bulletHoles[i];
                h.userData.lifeTime -= dt;
                if (h.userData.lifeTime <= 0) {
                    scene.remove(h); h.geometry.dispose(); h.material.dispose();
                    bulletHoles.splice(i, 1);
                }
            }
            for (let i = muzzleFlashes.length - 1; i >= 0; i--) {
                const f = muzzleFlashes[i];
                f.userData.lifeTime -= dt;
                f.children.forEach(sprite => { sprite.material.opacity -= dt * 5; });
                if (f.userData.lifeTime <= 0) {
                    scene.remove(f);
                    f.children.forEach(sprite => { sprite.material.map.dispose(); sprite.material.dispose(); });
                    muzzleFlashes.splice(i, 1);
                }
            }
            for (let i = bulletTrails.length - 1; i >= 0; i--) {
                const t = bulletTrails[i];
                t.userData.lifeTime -= dt;
                t.material.opacity -= dt * 4;
                if (t.userData.lifeTime <= 0 || t.material.opacity <= 0) {
                    scene.remove(t); t.geometry.dispose(); t.material.dispose();
                    bulletTrails.splice(i, 1);
                }
            }

            enemies.forEach(enemy => {
                const data = enemy.userData;
                if (data.isDead) {
                    data.deathTimer += dt;
                    if (data.deathTimer < 2.0) {
                        const progress = data.deathTimer / 2.0;
                        const dir = data.ragdollDir || 1;
                        enemy.rotation.z = dir * progress * 0.5; 
                        enemy.position.y -= progress * 0.2;
                    } else {
                        data.resetTimer += dt;
                        if (data.resetTimer > 2.0) {
                            data.isDead = false; data.hp = data.maxHp;
                            data.deathTimer = 0; data.resetTimer = 0;
                            enemy.rotation.z = 0;
                            enemy.position.y = -10.0 + 7.5;
                            data.updateHP();
                        }
                    }
                }
            });

            if (state.isSlideJumping) {
                state.slideJumpTime += dt;
                const progress = state.slideJumpTime / state.slideJumpDuration;
                if (progress >= 1.0) {
                    state.isSlideJumping = false; state.isGrounded = true;
                    state.currentCamY = 1.6; state.targetCamY = 1.6;
                    state.targetTilt = 0; state.currentSpeed = state.baseSpeed;
                    camera.position.y = 1.6;
                } else {
                    const heightCurve = Math.sin(progress * Math.PI) * state.slideJumpMaxHeight;
                    let speedMultiplier;
                    if (progress < 0.2) speedMultiplier = 1.0 + (progress / 0.2) * 1.0;
                    else if (progress < 0.7) speedMultiplier = 2.0;
                    else {
                        const decelProgress = (progress - 0.7) / 0.3;
                        speedMultiplier = 2.0 - decelProgress * 1.2;
                    }
                    state.currentSpeed = state.baseSpeed * speedMultiplier;
                    const distanceIncrement = state.currentSpeed * dt;
                    state.currentCamY = state.slideJumpStartY + heightCurve;
                    camera.position.y = state.currentCamY;
                    camera.position.x += state.slideJumpDirX * distanceIncrement;
                    camera.position.z += state.slideJumpDirZ * distanceIncrement;
                    state.targetTilt = 0.05 * (1 - progress);
                }
            }

            if (state.isSliding && !state.isSlideJumping) {
                state.slideDistance += state.currentSpeed * dt;
                if (state.slideDistance >= state.slideMaxDistance) {
                    state.isSliding = false; state.slideDistance = 0;
                    state.targetTilt = 0; state.targetCamY = 1.6;
                    state.currentSpeed = state.baseSpeed;
                }
            }
            if (state.slideCooldown > 0) state.slideCooldown -= dt;

            if (!state.isSliding && !state.isSlideJumping && state.isGrounded) {
                const speedBase = state.isAiming ? state.baseSpeedAim : state.baseSpeed;
                const targetSpd = moving ? speedBase : 0;
                state.currentSpeed += (targetSpd - state.currentSpeed) * 8 * dt;
            }

            if (state.isSliding && !state.isSlideJumping) {
                camera.position.x += state.slideDirX * state.currentSpeed * dt;
                camera.position.z += state.slideDirZ * state.currentSpeed * dt;
            } else if (!state.isSlideJumping && (moving || state.currentSpeed > 0.1)) {
                const fwd = new THREE.Vector3();
                camera.getWorldDirection(fwd);
                fwd.y = 0; fwd.normalize();
                const rgt = new THREE.Vector3().crossVectors(fwd, new THREE.Vector3(0, 1, 0)).normalize();
                const mv = new THREE.Vector3().addScaledVector(fwd, -state.moveZ).addScaledVector(rgt, state.moveX);
                if (mv.length() > 1) mv.normalize();
                camera.position.x += mv.x * state.currentSpeed * dt;
                camera.position.z += mv.z * state.currentSpeed * dt;
            }

            if (!state.isGrounded && !state.isSlideJumping) {
                state.jumpVel -= 15 * dt;
                state.currentCamY += state.jumpVel * dt;
                if (state.currentCamY <= 1.6) {
                    state.currentCamY = 1.6; state.jumpVel = 0;
                    state.isGrounded = true; state.targetCamY = 1.6;
                    state.slideCooldown = 0;
                }
            }

            if (!state.isSlideJumping) {
                if (state.isGrounded && !state.isSliding) state.currentCamY += (state.targetCamY - state.currentCamY) * 12 * dt;
                else if (state.isSliding) state.currentCamY += (state.targetCamY - state.currentCamY) * 10 * dt;
                camera.position.y = state.currentCamY;
            }

            state.currentTilt += (state.targetTilt - state.currentTilt) * 10 * dt;
            camera.rotation.z = state.currentTilt;

            camera.rotation.order = 'YXZ';
            camera.rotation.y = state.eulerY;
            camera.rotation.x = state.eulerX;

            if (moving && state.isGrounded && !state.isSliding && !state.isSlideJumping) {
                state.bobTimer += dt * 8;
                const swing = Math.sin(state.bobTimer);
                camera.position.x += swing * 0.025;
                camera.position.y += (1 - Math.abs(swing)) * 0.015;
            } else {
                state.bobTimer *= 0.9;
            }

            if (moving && state.isGrounded && !state.isSliding && !state.isSlideJumping) {
                const swing = Math.sin(state.bobTimer);
                handGroup.position.x = 0.25 + swing * 0.03;
                handGroup.position.y = -0.35 + (1 - Math.abs(swing)) * 0.015;
            } else {
                handGroup.position.x += (0.25 - handGroup.position.x) * 8 * dt;
                handGroup.position.y += (-0.35 - handGroup.position.y) * 8 * dt;
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            update(clock.getDelta());
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
