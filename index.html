<!DOCTYPE html>
<html lang="zh-CN">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
	<title>合成大西瓜 · 至尊金瓜3D画廊</title>
	<style>
		* {
			margin: 0;
			padding: 0;
			box-sizing: border-box;
			user-select: none;
			-webkit-tap-highlight-color: transparent;
			touch-action: none;
		}

		body {
			background: linear-gradient(145deg, #1a6b2f 0%, #0a3a15 100%);
			width: 100vw;
			height: 100vh;
			overflow: hidden;
			position: fixed;
			top: 0;
			left: 0;
			font-family: system-ui, 'Segoe UI', sans-serif;
		}

		.game-main {
			width: 100%;
			height: 100%;
			display: flex;
			flex-direction: column;
			background: #fdf5e3;
			transition: opacity 0.3s, filter 0.3s;
		}

		.game-main.blurred {
			filter: blur(5px) brightness(0.3);
			pointer-events: none;
		}

		.top-bar {
			display: flex;
			justify-content: space-between;
			align-items: center;
			padding: 12px 18px;
			background: #2a241a;
			gap: 12px;
			flex-shrink: 0;
		}

		.score-panel, .best-panel {
			background: #1e1910;
			padding: 5px 16px;
			border-radius: 40px;
			text-align: center;
			flex: 1;
		}

		.score-panel span, .best-panel span {
			font-size: 12px;
			color: #ffcd94;
			display: block;
		}

		.score-val, .best-val {
			font-size: 28px;
			font-weight: bold;
			color: #f9e45b;
			line-height: 1;
		}

		.reset-btn {
			background: #ff8c42;
			border: none;
			font-size: 18px;
			font-weight: bold;
			padding: 8px 20px;
			border-radius: 40px;
			color: #2d2b1f;
			box-shadow: 0 3px 0 #a0522d;
			cursor: pointer;
			transition: 0.05s linear;
		}

		.reset-btn:active {
			transform: translateY(2px);
			box-shadow: 0 1px 0 #a0522d;
		}

		.canvas-area {
			flex: 1;
			display: flex;
			justify-content: center;
			align-items: center;
			background: #fff9ef;
			min-height: 0;
			position: relative;
		}

		canvas#gameCanvas {
			width: 100%;
			height: 100%;
			display: block;
			background: #fff9ef;
			touch-action: none;
		}

		/* 弹窗样式 */
		.modal-overlay {
			position: fixed;
			top: 0;
			left: 0;
			width: 100%;
			height: 100%;
			background: rgba(0,0,0,0.8);
			backdrop-filter: blur(8px);
			display: flex;
			justify-content: center;
			align-items: center;
			z-index: 1000;
		}
		.thanks-card {
			background: linear-gradient(145deg, #fff5e6, #ffe0c4);
			border-radius: 48px;
			padding: 32px 28px;
			text-align: center;
			max-width: 320px;
			width: 80%;
			box-shadow: 0 20px 35px rgba(0,0,0,0.4);
			border: 2px solid gold;
		}
		.thanks-card h2 { font-size: 28px; color: #d48d2b; margin-bottom: 20px; }
		.thanks-card p { font-size: 20px; font-weight: bold; color: #2c5a2a; margin: 16px 0; }
		.highlight-btn {
			background: linear-gradient(135deg, #ffd966, #ffb347);
			border: none;
			font-size: 20px;
			font-weight: bold;
			padding: 12px 24px;
			border-radius: 60px;
			margin: 12px 8px;
			cursor: pointer;
			box-shadow: 0 4px 8px rgba(0,0,0,0.2);
			transition: transform 0.1s;
		}
		.highlight-btn:active { transform: scale(0.96); }
		.ok-btn { background: #4cae4c; color: white; box-shadow: 0 4px 0 #2e6b2e; }
		.password-modal {
			position: fixed;
			top: 0;
			left: 0;
			width: 100%;
			height: 100%;
			background: rgba(0,0,0,0.85);
			display: flex;
			justify-content: center;
			align-items: center;
			z-index: 1100;
		}
		.password-box {
			background: #2c241a;
			border-radius: 48px;
			padding: 32px;
			text-align: center;
			color: #ffeaac;
			width: 280px;
		}
		.password-box input {
			width: 100%;
			padding: 12px;
			margin: 20px 0;
			font-size: 24px;
			text-align: center;
			border-radius: 40px;
			border: none;
			background: #fff2df;
		}
		/* ========== 3D画廊容器 (CSS 3D + 华丽光影) ========== */
		.gallery-container {
			position: fixed;
			top: 0;
			left: 0;
			width: 100%;
			height: 100%;
			z-index: 2000;
			display: none;
			background: radial-gradient(circle at center, #0a0a2a, #000000);
			perspective: 1200px;
			overflow: hidden;
		}
		.gallery-container.active {
			display: flex;
			justify-content: center;
			align-items: center;
		}
		/* 3D画框组 */
		.frame-3d {
			width: 320px;
			height: 320px;
			position: relative;
			transform-style: preserve-3d;
			transform: rotateX(5deg) rotateY(0deg) translateZ(50px);
			transition: transform 0.1s ease-out;
			cursor: grab;
		}
		.frame-3d:active {
			cursor: grabbing;
		}
		/* 画框主体 */
		.frame-inner {
			width: 100%;
			height: 100%;
			background: linear-gradient(145deg, #ffdd99, #ccaa66);
			padding: 18px;
			border-radius: 28px;
			box-shadow: 0 0 50px rgba(255, 200, 50, 0.6), inset 0 1px 4px rgba(255,255,200,0.8);
			position: relative;
			transform: translateZ(20px);
		}
		.frame-inner img {
			width: 100%;
			height: 100%;
			object-fit: contain;
			border-radius: 16px;
			box-shadow: 0 10px 25px rgba(0,0,0,0.5);
			background: #fff8e7;
		}
		/* 画框装饰宝石 */
		.gem {
			position: absolute;
			width: 20px;
			height: 20px;
			background: radial-gradient(circle, #ff6688, #ff2244);
			border-radius: 50%;
			box-shadow: 0 0 15px #ff3366;
			z-index: 10;
		}
		.gem-top-left { top: -8px; left: -8px; }
		.gem-top-right { top: -8px; right: -8px; }
		.gem-bottom-left { bottom: -8px; left: -8px; }
		.gem-bottom-right { bottom: -8px; right: -8px; }
		/* 光晕特效 */
		.glow-effect {
			position: absolute;
			top: -30px;
			left: -30px;
			right: -30px;
			bottom: -30px;
			background: radial-gradient(circle, rgba(255,200,100,0.3), transparent 70%);
			border-radius: 60px;
			pointer-events: none;
			animation: pulseGlow 2s ease-in-out infinite;
		}
		@keyframes pulseGlow {
			0% { opacity: 0.4; transform: scale(0.98); }
			50% { opacity: 0.8; transform: scale(1.02); }
			100% { opacity: 0.4; transform: scale(0.98); }
		}
		/* 漂浮粒子 */
		.particle {
			position: absolute;
			width: 4px;
			height: 4px;
			background: radial-gradient(circle, #ffaa55, #ff6644);
			border-radius: 50%;
			pointer-events: none;
			animation: floatParticle 4s ease-in-out infinite;
			opacity: 0.6;
		}
		@keyframes floatParticle {
			0% { transform: translateY(0) translateX(0) scale(1); opacity: 0.6; }
			100% { transform: translateY(-200px) translateX(100px) scale(0); opacity: 0; }
		}
		.title-3d {
			margin-top: 50px;
			font-size: 32px;
			font-weight: bold;
			color: gold;
			text-shadow: 0 0 20px orange, 0 0 40px red;
			letter-spacing: 4px;
			animation: titleGlow 1.5s ease-in-out infinite;
			text-align: center;
			transform: translateZ(30px);
		}
		@keyframes titleGlow {
			0% { text-shadow: 0 0 10px gold; }
			50% { text-shadow: 0 0 30px #ffaa33, 0 0 20px #ff6633; }
			100% { text-shadow: 0 0 10px gold; }
		}
		.back-3d-btn {
			position: fixed;
			bottom: 40px;
			left: 40px;
			background: rgba(0,0,0,0.7);
			color: white;
			border: none;
			padding: 14px 32px;
			border-radius: 60px;
			font-size: 20px;
			font-weight: bold;
			z-index: 2100;
			backdrop-filter: blur(8px);
			cursor: pointer;
			transition: 0.1s;
			font-family: system-ui;
		}
		.back-3d-btn:active { transform: scale(0.96); }
		.instruction {
			position: fixed;
			bottom: 30px;
			right: 30px;
			color: rgba(255,255,200,0.6);
			background: rgba(0,0,0,0.4);
			padding: 6px 12px;
			border-radius: 30px;
			font-size: 12px;
			pointer-events: none;
		}
	</style>
</head>
<body>
<div class="game-main" id="gameMain">
	<div class="top-bar">
		<div class="score-panel"><span>🍉 分数</span><div class="score-val" id="scoreDisplay">0</div></div>
		<div class="best-panel"><span>🏆 最佳</span><div class="best-val" id="bestDisplay">0</div></div>
		<button class="reset-btn" id="resetButton">🍈 重来</button>
	</div>
	<div class="canvas-area">
		<canvas id="gameCanvas"></canvas>
	</div>
</div>
<div id="galleryContainer" class="gallery-container">
	<div style="text-align: center; transform-style: preserve-3d;">
		<div id="frame3d" class="frame-3d">
			<div class="glow-effect"></div>
			<div class="frame-inner">
				<img id="celebrationImage" src="https://www.boximchat.com/file/box-im/image/20260602/2061803225962549248.jpg" alt="至尊金瓜">
			</div>
			<div class="gem gem-top-left"></div>
			<div class="gem gem-top-right"></div>
			<div class="gem gem-bottom-left"></div>
			<div class="gem gem-bottom-right"></div>
		</div>
		<div class="title-3d">✨ 至 尊 金 瓜 ✨</div>
	</div>
	<div class="instruction">👆 手指拖动旋转 | 双指缩放视角</div>
	<button id="backFromGallery" class="back-3d-btn">← BACK 返回游戏</button>
</div>

<script>
	// ========== 1. 游戏2D核心 ==========
	const LOGIC_W = 500;
	const LOGIC_H = 720;
	const canvas = document.getElementById('gameCanvas');
	const ctx = canvas.getContext('2d');
	canvas.width = LOGIC_W;
	canvas.height = LOGIC_H;
	
	function fitCanvas() {
		const area = document.querySelector('.canvas-area');
		if(area) {
			const w = area.clientWidth, h = area.clientHeight;
			const ratio = LOGIC_W / LOGIC_H;
			let dw = w, dh = w / ratio;
			if(dh > h) { dh = h; dw = h * ratio; }
			canvas.style.width = dw + 'px';
			canvas.style.height = dh + 'px';
		}
	}
	window.addEventListener('resize', fitCanvas);
	fitCanvas();
	
	// 加载图片 (7种基础 + 1彩蛋)
	const fruitImg = [];
	const baseUrls = [
		"https://www.boximchat.com/file/box-im/image/20260602/2061794202001379328.webp",
		"https://www.boximchat.com/file/box-im/image/20260602/2061794210339655680.webp",
		"https://www.boximchat.com/file/box-im/image/20260602/2061794193939927040.webp",
		"https://www.boximchat.com/file/box-im/image/20260602/2061794155826286592.jpg",
		"https://www.boximchat.com/file/box-im/image/20260602/2061794177817022464.jpg",
		"https://www.boximchat.com/file/box-im/image/20260602/2061794169369694208.jpg",
		"https://www.boximchat.com/file/box-im/image/20260602/2061794186146910208.webp"
	];
	for(let i=0;i<7;i++){ let img=new Image(); img.src=baseUrls[i]; fruitImg.push(img); }
	const eggImg = new Image();
	eggImg.src = "https://www.boximchat.com/file/box-im/image/20260602/2061803225962549248.jpg";
	fruitImg.push(eggImg);
	
	const RADIUS = [36, 42, 48, 54, 60, 66, 74, 82];
	const SCORE = [5,10,20,40,80,160,320,999];
	const EGG_TYPE = 7;
	
	let fruits = [];
	let nextType = 0;
	let currentScore = 0;
	let bestScore = 0;
	let gameOver = false;
	let aimX = LOGIC_W/2;
	let isDragging = false;
	let eggUnlocked = false;
	
	let userIP = "local";
	async function loadBest() {
		try {
			const res = await fetch('https://api.ipify.org?format=json');
			const data = await res.json();
			userIP = data.ip || "device";
		} catch(e) { userIP = "offline"; }
		const saved = localStorage.getItem(`wm_best_${userIP}`);
		bestScore = saved ? parseInt(saved) : 0;
		updateUI();
	}
	function saveBest() {
		if(currentScore > bestScore) {
			bestScore = currentScore;
			localStorage.setItem(`wm_best_${userIP}`, bestScore);
			updateUI();
		}
	}
	function addScore(pts) { currentScore += pts; updateUI(); saveBest(); }
	function updateUI() {
		document.getElementById('scoreDisplay').innerText = currentScore;
		document.getElementById('bestDisplay').innerText = bestScore;
	}
	
	// 物理：极低弹跳
	const GRAVITY = 0.38;
	const BOUNCE = 0.08;
	const AIR_DRAG = 0.998;
	const GROUND_DRAG = 0.99;
	const WALL_BOUNCE = 0.2;
	
	function updatePhysics() {
		for(let f of fruits) {
			f.vy += GRAVITY;
			f.vx *= AIR_DRAG;
			f.vy *= AIR_DRAG;
			f.x += f.vx;
			f.y += f.vy;
			const r = RADIUS[f.type];
			if(f.x - r < 0) { f.x = r; f.vx = -f.vx * WALL_BOUNCE; if(Math.abs(f.vx)<0.3) f.vx=0; }
			if(f.x + r > LOGIC_W) { f.x = LOGIC_W - r; f.vx = -f.vx * WALL_BOUNCE; if(Math.abs(f.vx)<0.3) f.vx=0; }
			if(f.y + r > LOGIC_H) {
				f.y = LOGIC_H - r;
				if(Math.abs(f.vy) > 0.4) f.vy = -f.vy * BOUNCE;
				else f.vy = 0;
				if(Math.abs(f.vy) < 0.2) f.vy = 0;
				f.vx *= GROUND_DRAG;
				if(Math.abs(f.vx)<0.2) f.vx=0;
			}
			if(f.y - r < 0) { f.y = r; if(f.vy<0) f.vy = -f.vy*0.15; }
		}
	}
	
	function tryMerge(a,b) {
		if(a.type !== b.type) return false;
		if(a.type === EGG_TYPE) return false;
		let newType = a.type + 1;
		if(newType === EGG_TYPE && !eggUnlocked) return false;
		if(newType > EGG_TYPE) return false;
		
		const midX = (a.x+b.x)/2;
		const midY = (a.y+b.y)/2 - 5;
		const idx1 = fruits.indexOf(a);
		const idx2 = fruits.indexOf(b);
		if(idx1 !== -1) fruits.splice(idx1,1);
		const nidx = fruits.indexOf(b);
		if(nidx !== -1) fruits.splice(nidx,1);
		
		const newFruit = {
			x: midX, y: midY,
			vx: (a.vx+b.vx)*0.5 + (Math.random()-0.5)*0.6,
			vy: (a.vy+b.vy)*0.5 - 0.5,
			type: newType
		};
		fruits.push(newFruit);
		addScore(SCORE[newType]);
		
		if(newType === EGG_TYPE && eggUnlocked) {
			show3DGallery();
		}
		return true;
	}
	
	function handleCollisions() {
		let merged = true;
		let loop = 0;
		while(merged && loop < 10) {
			merged = false;
			for(let i=0;i<fruits.length;i++) {
				for(let j=i+1;j<fruits.length;j++) {
					const a=fruits[i], b=fruits[j];
					const dx = a.x-b.x, dy = a.y-b.y;
					const dist = Math.hypot(dx,dy);
					const minD = RADIUS[a.type]+RADIUS[b.type];
					if(dist < minD) {
						const angle = Math.atan2(dy,dx);
						const overlap = minD - dist;
						const moveX = Math.cos(angle)*overlap*0.5;
						const moveY = Math.sin(angle)*overlap*0.5;
						a.x += moveX; a.y += moveY;
						b.x -= moveX; b.y -= moveY;
						const nx = dx/dist, ny = dy/dist;
						const vrelx = a.vx-b.vx, vrely = a.vy-b.vy;
						const dot = vrelx*nx + vrely*ny;
						if(dot < 0) {
							const e = 0.15;
							const imp = (1+e)*dot;
							a.vx -= imp*nx; a.vy -= imp*ny;
							b.vx += imp*nx; b.vy += imp*ny;
						}
					}
				}
			}
			for(let i=0;i<fruits.length;i++) {
				for(let j=i+1;j<fruits.length;j++) {
					const a=fruits[i], b=fruits[j];
					const dist = Math.hypot(a.x-b.x, a.y-b.y);
					const minD = RADIUS[a.type]+RADIUS[b.type];
					if(dist < minD+3 && a.type === b.type) {
						if(tryMerge(a,b)) { merged=true; break; }
					}
				}
				if(merged) break;
			}
			loop++;
		}
	}
	
	function checkGameOver() {
		if(gameOver) return;
		for(let f of fruits) {
			const moving = Math.abs(f.vy) > 0.5;
			if(!moving && (f.y - RADIUS[f.type] < 28)) {
				gameOver = true;
				return;
			}
			if(f.y - RADIUS[f.type] < 5) { gameOver=true; return; }
		}
	}
	
	function spawnFruit(xPos) {
		if(gameOver) return false;
		const type = nextType;
		const rad = RADIUS[type];
		let targetX = Math.min(LOGIC_W-rad-5, Math.max(rad+5, xPos));
		let collide = false;
		for(let f of fruits) {
			if(Math.hypot(f.x-targetX, f.y-42) < RADIUS[f.type]+rad+3) { collide=true; break; }
		}
		if(collide) {
			let offsets = [0,10,-10,20,-20,30,-30];
			let placed = false;
			for(let off of offsets) {
				let nx = targetX+off;
				if(nx>rad+4 && nx<LOGIC_W-rad-4) {
					let ok = true;
					for(let f of fruits) {
						if(Math.hypot(f.x-nx, f.y-42) < RADIUS[f.type]+rad+2) { ok=false; break; }
					}
					if(ok) { targetX=nx; placed=true; break; }
				}
			}
			if(!placed) { gameOver=true; return false; }
		}
		fruits.push({ x:targetX, y:42, vx:(Math.random()-0.5)*0.6, vy:0, type:type });
		let r = Math.random();
		if(r<0.65) nextType=0;
		else if(r<0.8) nextType=1;
		else if(r<0.92) nextType=2;
		else nextType=3;
		if(nextType>5) nextType=0;
		return true;
	}
	
	function resetGame() {
		fruits = [];
		currentScore = 0;
		gameOver = false;
		nextType = 0;
		updateUI();
	}
	
	function draw2D() {
		ctx.clearRect(0,0,LOGIC_W,LOGIC_H);
		ctx.fillStyle="#e6d5b3"; ctx.fillRect(0,LOGIC_H-14,LOGIC_W,14);
		ctx.fillStyle="#bc9a6c"; ctx.fillRect(0,LOGIC_H-7,LOGIC_W,7);
		for(let f of fruits) {
			const r = RADIUS[f.type];
			const img = fruitImg[f.type];
			if(img && img.complete && img.naturalWidth>0) {
				ctx.save(); ctx.shadowBlur=5; ctx.beginPath(); ctx.arc(f.x,f.y,r-2,0,Math.PI*2); ctx.clip();
				ctx.drawImage(img, f.x-r, f.y-r, r*2, r*2); ctx.restore();
			} else {
				ctx.beginPath(); ctx.arc(f.x,f.y,r-2,0,Math.PI*2); ctx.fillStyle="#e0b87a"; ctx.fill();
			}
		}
		const rpre = RADIUS[nextType];
		ctx.globalAlpha=0.85;
		ctx.beginPath(); ctx.setLineDash([5,7]); ctx.moveTo(aimX,18); ctx.lineTo(aimX,75); ctx.strokeStyle="#f5ac78"; ctx.stroke();
		if(fruitImg[nextType] && fruitImg[nextType].complete) {
			ctx.drawImage(fruitImg[nextType], aimX-rpre, 8, rpre*2, rpre*2);
		}
		ctx.globalAlpha=1;
		if(gameOver) {
			ctx.font="bold 30px system-ui"; ctx.fillStyle="#d9782e"; ctx.fillText("GAME OVER", LOGIC_W/2-120, LOGIC_H/2);
		}
	}
	
	function gameLoop() {
		if(!gameOver) {
			for(let i=0;i<5;i++) { updatePhysics(); handleCollisions(); }
			checkGameOver();
		}
		draw2D();
		requestAnimationFrame(gameLoop);
	}
	
	// ========== 2. CSS 3D 画廊 (图片100%显示，带拖拽旋转) ==========
	let galleryActive = false;
	let currentRotX = 5, currentRotY = 0;
	let startX = 0, startY = 0;
	let isDragging3D = false;
	
	function show3DGallery() {
		if(galleryActive) return;
		galleryActive = true;
		
		const container = document.getElementById('galleryContainer');
		const frame = document.getElementById('frame3d');
		const gameMain = document.getElementById('gameMain');
		
		// 重置旋转角度
		currentRotX = 5;
		currentRotY = 0;
		updateFrameTransform();
		
		container.classList.add('active');
		gameMain.classList.add('blurred');
		
		// 生成漂浮粒子特效
		for(let i=0;i<60;i++) {
			createParticle(container);
		}
		setInterval(() => {
			if(galleryActive) createParticle(container);
		}, 400);
		
		// 拖拽旋转逻辑
		const onPointerStart = (e) => {
			e.preventDefault();
			isDragging3D = true;
			const clientX = e.touches ? e.touches[0].clientX : e.clientX;
			const clientY = e.touches ? e.touches[0].clientY : e.clientY;
			startX = clientX;
			startY = clientY;
		};
		
		const onPointerMove = (e) => {
			if(!isDragging3D) return;
			e.preventDefault();
			const clientX = e.touches ? e.touches[0].clientX : e.clientX;
			const clientY = e.touches ? e.touches[0].clientY : e.clientY;
			const deltaX = clientX - startX;
			const deltaY = clientY - startY;
			currentRotY += deltaX * 0.5;
			currentRotX -= deltaY * 0.3;
			currentRotX = Math.min(30, Math.max(-20, currentRotX));
			currentRotY = Math.min(45, Math.max(-45, currentRotY));
			updateFrameTransform();
			startX = clientX;
			startY = clientY;
		};
		
		const onPointerEnd = () => {
			isDragging3D = false;
		};
		
		function updateFrameTransform() {
			frame.style.transform = `rotateX(${currentRotX}deg) rotateY(${currentRotY}deg) translateZ(40px)`;
		}
		
		frame.addEventListener('touchstart', onPointerStart, {passive: false});
		frame.addEventListener('touchmove', onPointerMove, {passive: false});
		frame.addEventListener('touchend', onPointerEnd);
		frame.addEventListener('mousedown', onPointerStart);
		window.addEventListener('mousemove', onPointerMove);
		window.addEventListener('mouseup', onPointerEnd);
		
		// 返回按钮
		const backBtn = document.getElementById('backFromGallery');
		const newBack = backBtn.cloneNode(true);
		backBtn.parentNode.replaceChild(newBack, backBtn);
		newBack.onclick = () => {
			galleryActive = false;
			container.classList.remove('active');
			gameMain.classList.remove('blurred');
			frame.removeEventListener('touchstart', onPointerStart);
			frame.removeEventListener('touchmove', onPointerMove);
			frame.removeEventListener('touchend', onPointerEnd);
			frame.removeEventListener('mousedown', onPointerStart);
		};
	}
	
	function createParticle(container) {
		const particle = document.createElement('div');
		particle.className = 'particle';
		const size = Math.random() * 6 + 2;
		particle.style.width = size + 'px';
		particle.style.height = size + 'px';
		particle.style.left = Math.random() * 100 + '%';
		particle.style.top = Math.random() * 100 + '%';
		particle.style.animationDuration = Math.random() * 3 + 2 + 's';
		particle.style.animationDelay = Math.random() * 2 + 's';
		container.appendChild(particle);
		setTimeout(() => { if(particle.parentNode) particle.remove(); }, 4000);
	}
	
	// ========== 3. 弹窗与事件 ==========
	function showThanksAndPassword() {
		const modal = document.createElement('div');
		modal.className = 'modal-overlay';
		modal.innerHTML = `
			<div class="thanks-card">
				<h2>✨ 特别鸣谢 ✨</h2>
				<p>黄XX 提供核心美术资源</p>
				<button id="huangBtn" class="highlight-btn">🌟 黄XX 🌟</button>
				<button id="okStartBtn" class="highlight-btn ok-btn">OK 进入游戏</button>
			</div>
		`;
		document.body.appendChild(modal);
		
		document.getElementById('huangBtn').onclick = () => {
			modal.remove();
			showPasswordDialog();
		};
		document.getElementById('okStartBtn').onclick = () => {
			modal.remove();
			startGame();
		};
	}
	
	function showPasswordDialog() {
		const pwdModal = document.createElement('div');
		pwdModal.className = 'password-modal';
		pwdModal.innerHTML = `
			<div class="password-box">
				<h3>🔐 彩蛋密码</h3>
				<input type="password" id="pwdInput" placeholder="输入密码" autocomplete="off">
				<button id="unlockBtn" class="highlight-btn">解锁至尊金瓜</button>
				<button id="closePwd" class="highlight-btn" style="background:#555">跳过</button>
			</div>
		`;
		document.body.appendChild(pwdModal);
		
		document.getElementById('unlockBtn').onclick = () => {
			const pwd = document.getElementById('pwdInput').value;
			if(pwd === '54188') {
				eggUnlocked = true;
				alert('🎉 彩蛋已解锁！现在合成大西瓜后可继续合成【至尊金瓜】，合成后将有3D豪华庆祝！');
				pwdModal.remove();
				startGame();
			} else {
				alert('密码错误！');
				pwdModal.remove();
				startGame();
			}
		};
		document.getElementById('closePwd').onclick = () => {
			pwdModal.remove();
			startGame();
		};
	}
	
	function startGame() {
		resetGame();
		gameLoop();
		loadBest();
		
		function getLogicX(e) {
			const rect = canvas.getBoundingClientRect();
			const scale = LOGIC_W / rect.width;
			let cx = e.touches ? e.touches[0].clientX : e.clientX;
			let val = (cx - rect.left) * scale;
			return Math.min(LOGIC_W-20, Math.max(20, val));
		}
		canvas.addEventListener('touchstart', (e)=>{ e.preventDefault(); aimX=getLogicX(e); isDragging=true; });
		canvas.addEventListener('touchmove', (e)=>{ e.preventDefault(); if(!gameOver) aimX=getLogicX(e); });
		canvas.addEventListener('touchend', (e)=>{ e.preventDefault(); if(!gameOver && isDragging) spawnFruit(aimX); isDragging=false; });
		canvas.addEventListener('mousedown', (e)=>{ e.preventDefault(); aimX=getLogicX(e); isDragging=true; });
		window.addEventListener('mouseup', (e)=>{ if(isDragging && !gameOver) spawnFruit(aimX); isDragging=false; });
		window.addEventListener('mousemove', (e)=>{ if(isDragging && !gameOver) aimX=getLogicX(e); });
		document.getElementById('resetButton').onclick = () => resetGame();
	}
	
	showThanksAndPassword();
	window.addEventListener('resize', fitCanvas);
</script>
