<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>第一人称射击 - 大叉痕 + 连杀</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;user-select:none;-webkit-tap-highlight-color:transparent}
        body{background:#000;width:100vw;height:100vh;height:100dvh;overflow:hidden;position:fixed;top:0;left:0;touch-action:none}
        canvas{display:block;position:fixed;top:0;left:0;z-index:1;touch-action:none}
        .divider{position:fixed;top:0;left:50%;width:1px;height:100%;border-left:1px dashed rgba(255,255,255,0.08);pointer-events:none;z-index:5}
        .joystick-zone{position:fixed;bottom:30px;left:20px;width:130px;height:130px;z-index:10;touch-action:none}
        .joystick-base{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:100px;height:100px;border-radius:50%;background:rgba(255,255,255,0.06);border:2px solid rgba(255,255,255,0.2)}
        .joystick-thumb{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:45px;height:45px;border-radius:50%;background:rgba(255,255,255,0.25);border:2px solid rgba(255,255,255,0.45)}
        .btn-jump{position:fixed;bottom:100px;right:30px;width:70px;height:70px;border-radius:50%;background:rgba(255,200,50,0.2);border:2px solid rgba(255,200,50,0.45);color:#ffc832;font-size:14px;font-weight:bold;display:flex;align-items:center;justify-content:center;z-index:10;touch-action:none}
        .btn-jump:active{background:rgba(255,200,50,0.5)}
        .btn-slide-wrap{position:fixed;bottom:30px;right:30px;display:flex;gap:10px;z-index:10;touch-action:none}
        .btn-reload{width:70px;height:70px;border-radius:50%;background:rgba(255,200,100,0.2);border:2px solid rgba(255,200,100,0.45);color:#ffcc44;font-size:12px;font-weight:bold;display:flex;align-items:center;justify-content:center;touch-action:none;flex-direction:column;line-height:1.2;cursor:pointer}
        .btn-reload:active{background:rgba(255,200,100,0.5)}
        .btn-reload .sub{font-size:8px;opacity:0.7}
        .btn-slide{width:70px;height:70px;border-radius:50%;background:rgba(100,200,255,0.2);border:2px solid rgba(100,200,255,0.45);color:#88ccff;font-size:14px;font-weight:bold;display:flex;align-items:center;justify-content:center;touch-action:none;cursor:pointer}
        .btn-slide:active{background:rgba(100,200,255,0.5)}
        .btn-aim{position:fixed;bottom:175px;right:30px;width:70px;height:70px;border-radius:50%;background:rgba(255,50,50,0.2);border:2px solid rgba(255,50,50,0.45);color:#ff5555;font-size:12px;font-weight:bold;display:flex;align-items:center;justify-content:center;z-index:10;touch-action:none}
        .btn-aim:active{background:rgba(255,50,50,0.5)}
        .btn-aim.disabled { opacity: 0.3; pointer-events: none; }
        #ammoHUD { position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%); z-index: 30; color: #fff; font-size: 20px; font-weight: bold; font-family: monospace; text-shadow: 0 0 10px rgba(0,0,0,0.8); pointer-events: none; background: rgba(0,0,0,0.5); padding: 5px 25px; border-radius: 25px; border: 1px solid rgba(255,255,255,0.2); display: flex; align-items: center; gap: 12px; }
        #ammoHUD .ammo-current { color: #ffcc44; }
        #ammoHUD .ammo-sep { color: #666; }
        #ammoHUD .ammo-reserve { color: #88ccff; }
        
        /* ===== 连杀显示（原版样式） ===== */
        #killIconWrapper { 
            position: fixed; bottom: 82px; left: 50%; transform: translateX(-50%); 
            z-index: 31; pointer-events: none; display: flex; align-items: center; 
            justify-content: center; gap: 6px; background: rgba(0,0,0,0.25); 
            padding: 2px 10px; border-radius: 10px; backdrop-filter: blur(2px); 
            border: 1px solid rgba(255,255,255,0.06); min-height: 20px; min-width: 30px; 
        }
        #killIconWrapper .kill-icon { 
            font-size: 13px; color: #ffdd44; text-shadow: 0 0 8px rgba(255,200,0,0.3); 
            display: none; line-height: 1; font-weight: bold; 
        }
        #killIconWrapper .kill-icon.show { display: inline; }
        #killIconWrapper .kill-icon.headshot { 
            color: #ff3333; text-shadow: 0 0 12px rgba(255,0,0,0.5); 
        }
        #killIconWrapper .kill-streak { 
            font-size: 11px; color: #ffaa00; text-shadow: 0 0 10px rgba(255,170,0,0.4); 
            display: none; font-weight: bold; line-height: 1; 
        }
        #killIconWrapper .kill-streak.show { display: inline; }

        #loadingText { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 999; color: #fff; font-size: 18px; font-family: sans-serif; background: rgba(0,0,0,0.8); padding: 15px 30px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.2); pointer-events: none; transition: opacity 0.5s; }
        #progressBar { position: fixed; top: 58%; left: 50%; transform: translate(-50%, 0); width: 60%; max-width: 300px; height: 6px; background: rgba(255,255,255,0.15); border-radius: 3px; z-index: 999; overflow: hidden; display: none; }
        #progressBar .fill { height: 100%; width: 0%; background: linear-gradient(90deg, #44ff88, #44aaff); border-radius: 3px; transition: width 0.3s; }
        @keyframes shimmer { 0% { background-position: 0% 0%; } 100% { background-position: 200% 0%; } }
        #reloadBar { position: fixed; bottom: 110px; left: 50%; transform: translateX(-50%); width: 150px; height: 4px; background: rgba(255,255,255,0.15); border-radius: 2px; z-index: 35; overflow: hidden; display: none; }
        #reloadBar .fill { height: 100%; width: 0%; background: #ffcc44; border-radius: 2px; transition: width 0.05s; }
        
        #xyzDisplay {
            position: fixed; top: 20px; right: 20px; z-index: 50;
            color: #00ff88; font-family: 'Courier New', monospace; font-size: 16px;
            background: rgba(0,0,0,0.7); padding: 10px 18px; border-radius: 8px;
            border: 1px solid rgba(0,255,136,0.3); text-shadow: 0 0 10px rgba(0,255,136,0.2);
            pointer-events: none; backdrop-filter: blur(4px); display: flex; gap: 16px; align-items: center;
        }
        #xyzDisplay .label { color: #88ccff; }
        #xyzDisplay .value { color: #00ff88; font-weight: bold; }
        #xyzDisplay .sep { color: #666; }
    </style>
</head>
<body>
    <div id="loadingText">⏳ 正在加载模型...</div>
    <div id="progressBar"><div class="fill" id="progressFill"></div></div>
    <div class="divider"></div>
    <div id="ammoHUD">
        <span class="ammo-current" id="ammoCurrent">30</span>
        <span class="ammo-sep">/</span>
        <span class="ammo-reserve" id="ammoReserve">900</span>
    </div>
    
    <!-- ===== 连杀显示 ===== -->
    <div id="killIconWrapper">
        <span class="kill-icon" id="killIcon">K</span>
        <span class="kill-streak" id="killStreak">x2</span>
    </div>
    
    <div id="reloadBar"><div class="fill" id="reloadFill"></div></div>

    <div id="xyzDisplay">
        <span><span class="label">X</span> <span class="value" id="xVal">0.00</span></span>
        <span class="sep">|</span>
        <span><span class="label">Y</span> <span class="value" id="yVal">0.00</span></span>
        <span class="sep">|</span>
        <span><span class="label">Z</span> <span class="value" id="zVal">0.00</span></span>
    </div>

    <div class="joystick-zone" id="joystickZone">
        <div class="joystick-base"></div>
        <div class="joystick-thumb" id="joystickThumb"></div>
    </div>
    <button class="btn-jump" id="jumpBtn">跳</button>
    
    <div class="btn-slide-wrap">
        <button class="btn-reload" id="reloadBtn">🔄<span class="sub">换弹</span></button>
        <button class="btn-slide" id="slideBtn">滑铲</button>
    </div>
    <button class="btn-aim" id="aimBtn">瞄准</button>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" } }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { RGBELoader } from 'three/addons/loaders/RGBELoader.js';

        // ==================== 音效系统 ====================
        class SoundFX {
            constructor() {
                this.ctx = null;
                this.enabled = true;
                try { this.ctx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) { this.enabled = false; }
            }
            resume() { if (this.ctx && this.ctx.state === 'suspended') this.ctx.resume(); }
            playFire() {
                if (!this.enabled || !this.ctx) return;
                this.resume();
                const now = this.ctx.currentTime;
                const bufferSize = this.ctx.sampleRate * 0.06;
                const buffer = this.ctx.createBuffer(1, bufferSize, this.ctx.sampleRate);
                const data = buffer.getChannelData(0);
                for (let i = 0; i < bufferSize; i++) {
                    const env = Math.exp(-i / (bufferSize * 0.3));
                    data[i] = (Math.random() * 2 - 1) * env;
                }
                const noise = this.ctx.createBufferSource();
                noise.buffer = buffer;
                const gain = this.ctx.createGain();
                gain.gain.setValueAtTime(0.5, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.06);
                const filter = this.ctx.createBiquadFilter();
                filter.type = 'highpass';
                filter.frequency.value = 800;
                noise.connect(filter);
                filter.connect(gain);
                gain.connect(this.ctx.destination);
                noise.start(now);
                noise.stop(now + 0.06);
            }
            playFootstep() {
                if (!this.enabled || !this.ctx) return;
                this.resume();
                const now = this.ctx.currentTime;
                const bufferSize = this.ctx.sampleRate * 0.12;
                const buffer = this.ctx.createBuffer(1, bufferSize, this.ctx.sampleRate);
                const data = buffer.getChannelData(0);
                for (let i = 0; i < bufferSize; i++) {
                    const env = Math.sin(i / bufferSize * Math.PI) * 0.9;
                    const noise = (Math.random() * 2 - 1) * 0.8;
                    data[i] = (Math.sin(i * 0.08) * 0.4 + noise * 0.6) * env;
                }
                const source = this.ctx.createBufferSource();
                source.buffer = buffer;
                const gain = this.ctx.createGain();
                gain.gain.setValueAtTime(0.45, now);
                gain.gain.exponentialRampToValueAtTime(0.001, now + 0.12);
                const filter = this.ctx.createBiquadFilter();
                filter.type = 'lowpass';
                filter.frequency.value = 400;
                source.connect(filter);
                filter.connect(gain);
                gain.connect(this.ctx.destination);
                source.start(now);
                source.stop(now + 0.12);
            }
            playSlide() {
                if (!this.enabled || !this.ctx) return;
                this.resume();
                const now = this.ctx.currentTime;
                const bufferSize = this.ctx.sampleRate * 0.25;
                const buffer = this.ctx.createBuffer(1, bufferSize, this.ctx.sampleRate);
                const data = buffer.getChannelData(0);
                for (let i = 0; i < bufferSize; i++) {
                    const env = 1 - (i / bufferSize);
                    const noise = (Math.random() * 2 - 1) * 0.9;
                    data[i] = noise * env * 0.8;
                }
                const noiseSrc = this.ctx.createBufferSource();
                noiseSrc.buffer = buffer;
                const gain = this.ctx.createGain();
                gain.gain.setValueAtTime(0.35, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.25);
                const filter = this.ctx.createBiquadFilter();
                filter.type = 'bandpass';
                filter.frequency.value = 600;
                noiseSrc.connect(filter);
                filter.connect(gain);
                gain.connect(this.ctx.destination);
                noiseSrc.start(now);
                noiseSrc.stop(now + 0.25);
            }
            playReload() {
                if (!this.enabled || !this.ctx) return;
                this.resume();
                const now = this.ctx.currentTime;
                for (let i = 0; i < 3; i++) {
                    setTimeout(() => {
                        const osc = this.ctx.createOscillator();
                        const g = this.ctx.createGain();
                        osc.type = 'square';
                        osc.frequency.setValueAtTime(800 + i * 300, now);
                        osc.frequency.exponentialRampToValueAtTime(400 + i * 200, now + 0.08);
                        g.gain.setValueAtTime(0.08, now);
                        g.gain.exponentialRampToValueAtTime(0.001, now + 0.08);
                        osc.connect(g);
                        g.connect(this.ctx.destination);
                        osc.start(now);
                        osc.stop(now + 0.08);
                    }, i * 150);
                }
            }
        }

        const sound = new SoundFX();

        // ==================== UI ====================
        const killIcon = document.getElementById('killIcon');
        const killStreak = document.getElementById('killStreak');
        const loadingText = document.getElementById('loadingText');
        const progressBar = document.getElementById('progressBar');
        const progressFill = document.getElementById('progressFill');
        const reloadFill = document.getElementById('reloadFill');
        const reloadBar = document.getElementById('reloadBar');
        const reloadBtn = document.getElementById('reloadBtn');
        const slideBtn = document.getElementById('slideBtn');
        const aimBtn = document.getElementById('aimBtn');
        const ammoCurrent = document.getElementById('ammoCurrent');
        const ammoReserve = document.getElementById('ammoReserve');
        const xVal = document.getElementById('xVal');
        const yVal = document.getElementById('yVal');
        const zVal = document.getElementById('zVal');

        // ==================== 弹药 ====================
        const MAG_SIZE = 30;
        let currentAmmo = 30;
        let reserveAmmo = 900;
        let isReloading = false;
        let reloadTimer = 0;
        const RELOAD_DURATION = 2.62;

        function updateAmmoHUD() {
            ammoCurrent.textContent = currentAmmo;
            ammoReserve.textContent = reserveAmmo;
        }
        function consumeAmmo() {
            if (isReloading) return false;
            if (currentAmmo > 0) {
                currentAmmo--;
                updateAmmoHUD();
                return true;
            } else {
                if (reserveAmmo > 0 && !isReloading) {
                    if (state.isAiming) {
                        state.isAiming = false;
                        state.aimTransitionTime = 0;
                        state.targetScale = 0.03; state.targetX = 0.00; state.targetY = -0.35; state.targetZ = 0.20;
                        state.targetRotX = 0.01; state.targetRotY = -3.14; state.targetRotZ = 0.01;
                    }
                    startReload();
                }
                return false;
            }
        }
        function startReload() {
            if (isReloading || reserveAmmo <= 0 || currentAmmo === MAG_SIZE) return;
            if (state.isAiming) {
                state.isAiming = false;
                state.aimTransitionTime = 0;
                state.targetScale = 0.03; state.targetX = 0.00; state.targetY = -0.35; state.targetZ = 0.20;
                state.targetRotX = 0.01; state.targetRotY = -3.14; state.targetRotZ = 0.01;
            }
            isReloading = true;
            reloadTimer = 0;
            reloadBar.style.display = 'block';
            reloadFill.style.width = '0%';
            reloadBtn.textContent = '⏳';
            reloadBtn.style.borderColor = '#ffcc44';
            aimBtn.classList.add('disabled');
            sound.playReload();
            playReloadAnimation();
        }
        function finishReload() {
            if (!isReloading) return;
            const need = MAG_SIZE - currentAmmo;
            const give = Math.min(need, reserveAmmo);
            currentAmmo += give;
            reserveAmmo -= give;
            isReloading = false;
            reloadBar.style.display = 'none';
            reloadFill.style.width = '0%';
            reloadBtn.textContent = '🔄';
            reloadBtn.style.borderColor = 'rgba(255,200,100,0.45)';
            aimBtn.classList.remove('disabled');
            updateAmmoHUD();
            if (currentAction) { currentAction.stop(); currentAction = null; }
        }

        // ==================== Three.js ====================
        const scene = new THREE.Scene();
        scene.background = new THREE.Color('#12121f');
        scene.fog = new THREE.Fog('#12121f', 8, 40);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.05, 100);
        camera.rotation.order = 'YXZ';
        scene.add(camera);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.2;
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.outputColorSpace = THREE.SRGBColorSpace;
        document.body.appendChild(renderer.domElement);

        // 环境
        const rgbeLoader = new RGBELoader();
        rgbeLoader.load('https://threejs.org/examples/textures/equirectangular/venice_sunset_1k.hdr', (texture) => {
            texture.mapping = THREE.EquirectangularReflectionMapping;
            scene.environment = texture;
        });

        const sun = new THREE.DirectionalLight('#ffffff', 2.5);
        sun.position.set(5, 15, 8);
        sun.castShadow = true;
        sun.shadow.mapSize.width = 2048;
        sun.shadow.mapSize.height = 2048;
        sun.shadow.camera.near = 0.5;
        sun.shadow.camera.far = 30;
        const d = 15;
        sun.shadow.camera.left = -d; sun.shadow.camera.right = d;
        sun.shadow.camera.top = d; sun.shadow.camera.bottom = -d;
        scene.add(sun);

        const fillLight = new THREE.DirectionalLight('#88aacc', 0.6);
        fillLight.position.set(-5, 0, 10);
        scene.add(fillLight);

        const ambient = new THREE.AmbientLight('#404060', 0.4);
        scene.add(ambient);

        // 地面
        const invisibleFloor = new THREE.Mesh(
            new THREE.PlaneGeometry(80, 80), 
            new THREE.MeshBasicMaterial({ transparent: true, opacity: 0 })
        );
        invisibleFloor.rotation.x = -Math.PI / 2;
        invisibleFloor.position.y = GROUND_Y;
        scene.add(invisibleFloor);

        const gridFloor = new THREE.Mesh(
            new THREE.PlaneGeometry(80, 80), 
            new THREE.MeshStandardMaterial({ color: '#333344', roughness: 0.8 })
        );
        gridFloor.rotation.x = -Math.PI / 2;
        gridFloor.position.y = -10.0; 
        gridFloor.receiveShadow = true;
        scene.add(gridFloor);
        
        const gridHelper = new THREE.GridHelper(80, 80, '#444455', '#222233');
        gridHelper.position.y = -10.0;
        scene.add(gridHelper);

        // ===== 掩体障碍物 =====
        const obstacleMat = new THREE.MeshStandardMaterial({ color: '#3a3a4a', roughness: 0.7, metalness: 0.1 });
        const obstacles = [];

        const obstacleData = [
            { x: -4, z: -3, w: 2, h: 1, d: 1 },
            { x: -4, z: 3, w: 2, h: 1, d: 1 },
            { x: 0, z: 0, w: 3, h: 2, d: 1 },
            { x: 4, z: -3, w: 2, h: 1, d: 1 },
            { x: 4, z: 3, w: 2, h: 1, d: 1 },
            { x: 0, z: -8, w: 5, h: 1.5, d: 0.5 },
        ];
        obstacleData.forEach(data => {
            const mesh = new THREE.Mesh(new THREE.BoxGeometry(data.w, data.h, data.d), obstacleMat);
            mesh.position.set(data.x, GROUND_Y + data.h / 2, data.z);
            mesh.castShadow = true;
            mesh.receiveShadow = true;
            mesh.userData.isObstacle = true;
            scene.add(mesh);
            obstacles.push(mesh);
        });

        // ===== 玩家血量 =====
        let playerHP = 100;
        const MAX_PLAYER_HP = 100;
        let isPlayerDead = false;
        let playerDeathTimer = 0;

        // ===== 准确度系统 =====
        let playerAccuracy = 0.60;
        let accuracyRecoveryTimer = 0;
        const ACC_MAX = 0.60;
        const ACC_MIN = 0.35;
        const ACC_SHOT_PENALTY = 0.02;
        const ACC_RECOVERY_RATE = 0.05;
        const ACC_RECOVERY_TIME = 1.5;
        const ACC_RANGE_PENALTY_DIST = 15;
        const ACC_RANGE_PENALTY = 0.10;
        const ACC_MOVE_LAG = 0.15;
        let aimLagX = 0, aimLagY = 0;

        // ===== 敌人 AI 系统 =====
        const AI_STATES = { IDLE: 'IDLE', ALERT: 'ALERT', COMBAT: 'COMBAT', RELOAD: 'RELOAD', HIT: 'HIT' };
        const AI_CONFIG = {
            VISUAL_RANGE: 25, VISUAL_ANGLE: 120 * Math.PI / 180,
            HEAR_RANGE: 25, HEAR_DELAY: 0.3,
            BACK_TURN_DELAY: 0.8,
            COMBAT_FIRE_MIN: 0.6, COMBAT_FIRE_MAX: 0.8,
            RETREAT_FIRE_MIN: 0.9, RETREAT_FIRE_MAX: 1.2,
            RETREAT_THRESHOLD: 0.3, RETREAT_SPEED: 2,
            RELOAD_DURATION_AI: 2.5, RELOAD_SHOT_COUNT: 15,
        };
        const enemyAIStates = new Map();
        let lastGunshotPos = null;
        let lastGunshotTime = -10;

        function initAIState(enemy) {
            const s = {
                state: AI_STATES.IDLE, stateTimer: 0,
                idleRotateTimer: 0, idleRotateTargetY: enemy.rotation.y,
                shotsFired: 0, reloadTimer: 0,
                hitTimer: 0, turnTimer: 0,
                lastKnownPlayerPos: null, isPlayerVisible: false,
                combatFireTimer: AI_CONFIG.COMBAT_FIRE_MIN + Math.random() * (AI_CONFIG.COMBAT_FIRE_MAX - AI_CONFIG.COMBAT_FIRE_MIN),
                retreatDir: new THREE.Vector3(0, 0, 1),
                strafeTimer: 0, strafeDir: 1,
            };
            enemyAIStates.set(enemy, s);
            return s;
        }

        // ===== 敌人 =====
        const enemies = [];
        let enemyGroup = null;
        let enemyMixer = null;
        let enemyAction = null;
        let gunModel = null;
        let deathMark = null;
        const raycaster = new THREE.Raycaster();
        let killStreakCount = 0;
        let lastKillTime = 0;
        const STREAK_WINDOW = 5.0;

        // ===== 连杀显示（原版样式） =====
        function updateKillUI(streak) {
            if (streak >= 2) {
                killIcon.textContent = 'K';
                killIcon.className = 'kill-icon show';
                killStreak.textContent = 'x' + streak;
                killStreak.className = 'kill-streak show';
            } else {
                killIcon.className = 'kill-icon';
                killStreak.className = 'kill-streak';
            }
        }

        // ===== 创建死亡叉痕（放大10倍，放在地面） =====
        function createDeathMark(position) {
            if (deathMark) {
                scene.remove(deathMark);
                deathMark = null;
            }
            
            const mat = new THREE.MeshBasicMaterial({ color: 0xff0000, transparent: true, opacity: 0.9 });
            const geo1 = new THREE.BoxGeometry(8, 0.05, 0.5);
            const geo2 = new THREE.BoxGeometry(8, 0.05, 0.5);
            
            const line1 = new THREE.Mesh(geo1, mat);
            const line2 = new THREE.Mesh(geo2, mat);
            
            line1.rotation.y = Math.PI / 4;
            line2.rotation.y = -Math.PI / 4;
            
            deathMark = new THREE.Group();
            deathMark.add(line1);
            deathMark.add(line2);
            deathMark.position.set(position.x, -10.0, position.z);
            
            scene.add(deathMark);
        }

        function removeDeathMark() {
            if (deathMark) {

                ctx.fillRect(2, 2, (c.width - 4) * Math.max(0, hp), c.height - 4);

        // 从 Gitee CDN 加载三个模型
        const MODEL_URLS = {
            model: 'https://raw.giteeusercontent.com/darkstargg/html/raw/master/model.glb',

        const modelCache = {};

        function updateProgressBar() {
            const pct = Math.min(downloadProgress * 100, 100);
            progressFill.style.width = pct + '%';
        }

        function downloadWithProgress(name, url) {
            return new Promise((resolve, reject) => {
                const xhr = new XMLHttpRequest();
                xhr.open('GET', url, true);
                xhr.responseType = 'arraybuffer';
                const share = 1 / totalModels;
                let finished = false;

                const timer = setTimeout(() => {
                    if (!finished) {
                        xhr.abort();
                        reject(new Error('下载超时'));
                    }
                }, 30000);

                let lastPct = 0;
                xhr.onprogress = (e) => {
                    if (e.lengthComputable) {
                        downloadProgress = (lastPct + (e.loaded / e.total) * share);
                        updateProgressBar();
                    } else {
                        progressFill.style.background = 'linear-gradient(90deg, #44ff88, #44aaff) 0% 0% / 200% 100%';
                        progressFill.style.animation = 'shimmer 1.5s infinite';
                    }
                };

                xhr.onload = () => {
                    if (finished) return;
                    finished = true;
                    clearTimeout(timer);
                    if (xhr.status >= 200 && xhr.status < 300) {
                        const buffer = xhr.response;
                        modelCache[name] = buffer;
                        lastPct += share;
                        downloadProgress = lastPct;
                        updateProgressBar();
                        console.log(`📦 ${name} 已下载到缓存 (${(buffer.byteLength / 1024).toFixed(1)}KB)`);
                        resolve(buffer);
                    } else {
                        reject(new Error(`HTTP ${xhr.status}`));
                    }
                };

                xhr.onerror = () => {
                    if (finished) return;
                    finished = true;
                    clearTimeout(timer);
                    reject(new Error('网络错误'));
                };

                xhr.onabort = () => {
                    if (finished) return;
                    finished = true;
                    clearTimeout(timer);
                    reject(new Error('已取消'));
                };

                xhr.send();
            });
        }

        function loadFromCache(name, callback) {
            return new Promise((resolve) => {
                const buffer = modelCache[name];
                if (!buffer) {
                    console.error(`❌ ${name} 缓存中不存在`);
                    resolve(false);
                    return;
                }
                loader.parse(buffer, '', (gltf) => {
                    try {
                        callback(gltf);
                        console.log(`✅ ${name} 加载成功`);
                        resolve(true);
                    } catch (e) {
                        console.error(`❌ ${name} 处理出错:`, e);
                        resolve(false);
                    }
                }, (err) => {
                    console.error(`❌ ${name} 解析失败:`, err);
                    resolve(false);
                });
            });
        }

        async function startLoadingModels() {

            downloadProgress = 0;
            updateProgressBar();

                await Promise.all([
                    downloadWithProgress('model', MODEL_URLS.model),
                    downloadWithProgress('gun', MODEL_URLS.gun),
                    downloadWithProgress('hand', MODEL_URLS.hand),
                ]);
            } catch (e) {
                console.error('❌ 部分模型下载失败:', e);
            }

            downloadProgress = 1;
            updateProgressBar();
            progressFill.style.animation = 'none';
            progressFill.style.background = 'linear-gradient(90deg, #44ff88, #44aaff)';

            loadingText.textContent = '⏳ 正在加载模型到场景...';

            await loadFromCache('gun', onGunLoaded);

        // ===== 特效 =====
        const bulletHoles = []; const muzzleFlashes = []; const bulletTrails = [];
        const holeMat = new THREE.MeshStandardMaterial({ color: 0x222222, roughness: 0.9 });

        function createBulletHit(pos, normal) {
            if (bulletHoles.length >= 10) {
                const old = bulletHoles.shift(); scene.remove(old);
                old.geometry.dispose(); old.material.dispose();
            }
            const hole = new THREE.Mesh(new THREE.CircleGeometry(0.06, 6), holeMat);
            hole.position.copy(pos).add(normal.clone().multiplyScalar(0.02));
            hole.lookAt(pos.clone().add(normal));
            scene.add(hole);
            bulletHoles.push(hole);

        function createMuzzleFlash(pos, dir) {
            const coreMat = new THREE.SpriteMaterial({
                map: new THREE.CanvasTexture(generateSparkTexture()),
                transparent: true, opacity: 1, blending: THREE.AdditiveBlending
            });
            const core = new THREE.Sprite(coreMat);
            core.scale.set(0.4, 0.4, 1);
            core.position.copy(pos);
            core.lookAt(pos.clone().add(dir));
            scene.add(core);

        function generateSparkTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 32; canvas.height = 32;
            const ctx = canvas.getContext('2d');
            const gradient = ctx.createRadialGradient(16, 16, 0, 16, 16, 16);
            gradient.addColorStop(0, 'rgba(255, 255, 200, 1)');
            gradient.addColorStop(0.2, 'rgba(255, 200, 100, 1)');
            gradient.addColorStop(0.6, 'rgba(255, 100, 20, 0.8)');
            gradient.addColorStop(1, 'rgba(255, 0, 0, 0)');
            ctx.fillStyle = gradient; ctx.fillRect(0, 0, 32, 32);
            return canvas;
        }

        function createBulletTrail(start, end) {
            const points = []; const steps = 8;
            for (let i = 0; i <= steps; i++) {
                const t = i / steps; points.push(new THREE.Vector3().lerpVectors(start, end, t));
            }
            const geo = new THREE.BufferGeometry().setFromPoints(points);
            const mat = new THREE.LineBasicMaterial({ color: 0xffdd44, transparent: true, opacity: 0.8 });
            const line = new THREE.Line(geo, mat);
            scene.add(line);
            line.userData.lifeTime = 0.08;
            bulletTrails.push(line);
        }

        // ===== 核心逻辑 =====

            currentSpeed: 22.5, baseSpeedAim: 10,
            eulerX: 0, eulerY: 0, jumpVel: 0, isGrounded: true,

        const lookSensitivity = 0.013;

        const joystickZone = document.getElementById('joystickZone');

        joystickZone.addEventListener('pointerdown', e => {

            const cx = rect.left + rect.width / 2, cy = rect.top + rect.height / 2;

            const maxR = 40, dist = Math.hypot(dx, dy);
            if (dist > maxR) { dx = (dx / dist) * maxR; dy = (dy / dist) * maxR; }
            joystickThumb.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
            state.moveX = dx / maxR;
            state.moveZ = dy / maxR;

        // 陀螺仪
        if (window.DeviceOrientationEvent) {

                DeviceOrientationEvent.requestPermission().then(s => {
                    if (s === 'granted') window.addEventListener('deviceorientation', handleOrientation);
                }).catch(console.error);
            } else {
                window.addEventListener('deviceorientation', handleOrientation);
            }
        }

        let initialBeta = null, initialGamma = null;
        function handleOrientation(event) {
            if (event.beta === null || event.gamma === null) return;
            if (initialBeta === null) { initialBeta = event.beta; initialGamma = event.gamma; return; }
            let deltaBeta = (event.beta - initialBeta) * gyroSensitivity;
            let deltaGamma = (event.gamma - initialGamma) * gyroSensitivity;
            deltaBeta = Math.max(-Math.PI / 3, Math.min(Math.PI / 3, deltaBeta));
            state.eulerX = Math.max(-Math.PI / 3, Math.min(Math.PI / 3, state.eulerX + deltaBeta * 0.01));
            state.eulerY += deltaGamma * 0.01;
        }

        // 视角滑动
        let viewActive = false, viewId = null, lvx = 0, lvy = 0;
        document.addEventListener('pointerdown', e => {
            if (e.clientX > window.innerWidth * 0.35 && !viewActive) {
                viewActive = true; viewId = e.pointerId; lvx = e.clientX; lvy = e.clientY;
                sound.resume();
            }
        });
        document.addEventListener('pointermove', e => {
            if (!viewActive || e.pointerId !== viewId) return;
            state.eulerY -= (e.clientX - lvx) * lookSensitivity;
            state.eulerX -= (e.clientY - lvy) * lookSensitivity;
            state.eulerX = Math.max(-Math.PI / 3, Math.min(Math.PI / 3, state.eulerX));
            lvx = e.clientX; lvy = e.clientY;
        });
        document.addEventListener('pointerup', e => { if (e.pointerId === viewId) { viewActive = false; viewId = null; } });
        renderer.domElement.addEventListener('click', () => { renderer.domElement.requestPointerLock(); });
        document.addEventListener('mousemove', e => {
            if (document.pointerLockElement === renderer.domElement) {
                state.eulerY -= e.movementX * lookSensitivity;
                state.eulerX -= e.movementY * lookSensitivity;
                state.eulerX = Math.max(-Math.PI / 3, Math.min(Math.PI / 3, state.eulerX));
            }
        });

        // ===== 按钮事件 =====

        reloadBtn.addEventListener('pointerdown', e => {

        function playReloadAnimation() {
            if (!handMixer || handAnimations.length === 0) return;
            if (currentAction) { currentAction.stop(); currentAction = null; }
            const clip = handAnimations[0];
            currentAction = handMixer.clipAction(clip);
            currentAction.play();
            currentAction.loop = THREE.LoopOnce;
            currentAction.clampWhenFinished = true;

            setTimeout(() => {

        // ===== 开火 =====
        function performFire() {
            if (isReloading || !state.isAiming || state.aimTransitionTime < state.aimDuration) return;
            if (!consumeAmmo()) return;

            sound.playFire();

            const centerPos = new THREE.Vector3(0, -0.1, -0.5);
            centerPos.applyQuaternion(camera.quaternion);
            const muzzlePos = camera.position.clone().add(centerPos);
            const forward = new THREE.Vector3(0, 0, -1);
            forward.applyQuaternion(camera.quaternion);

            createMuzzleFlash(muzzlePos, forward);
            state.eulerX += 0.02;

            playerAccuracy = Math.max(ACC_MIN, playerAccuracy - ACC_SHOT_PENALTY);
            accuracyRecoveryTimer = 0;

            lastGunshotPos = camera.position.clone();
            lastGunshotTime = performance.now() / 1000;

            const moving = Math.abs(state.moveX) > 0.05 || Math.abs(state.moveZ) > 0.05;
            let effectiveAccuracy = playerAccuracy;
            const dist = camera.position.distanceTo(enemies.length > 0 && enemies[0] ? enemies[0].position : new THREE.Vector3()) || 10;
            if (dist > ACC_RANGE_PENALTY_DIST) effectiveAccuracy -= ACC_RANGE_PENALTY;
            const spreadAngle = (1 - effectiveAccuracy) * 0.12;

            const aimDir = forward.clone();
            if (spreadAngle > 0) {
                const theta = Math.random() * Math.PI * 2;
                const phi = Math.random() * spreadAngle;
                const quat = new THREE.Quaternion().setFromUnitVectors(
                    new THREE.Vector3(0, 0, -1),
                    aimDir.clone().normalize()
                );
                const spreadVec = new THREE.Vector3(
                    Math.sin(theta) * Math.sin(phi),
                    Math.cos(theta) * Math.sin(phi),
                    -Math.cos(phi)
                ).normalize();
                spreadVec.applyQuaternion(quat);
                aimDir.copy(spreadVec);
            }

            if (moving && aimLagX !== undefined) {
                const lagFactor = 1 - Math.exp(-0.016 / ACC_MOVE_LAG);
                aimLagX += (spreadAngle * (Math.random() - 0.5) - aimLagX) * lagFactor;
                aimLagY += (spreadAngle * (Math.random() - 0.5) - aimLagY) * lagFactor;
            } else {
                aimLagX *= 0.9;
                aimLagY *= 0.9;
            }

            const finalDir = aimDir.clone();
            if (Math.abs(aimLagX) > 0.001 || Math.abs(aimLagY) > 0.001) {
                const right = new THREE.Vector3().crossVectors(finalDir, new THREE.Vector3(0, 1, 0)).normalize();
                const up = new THREE.Vector3().crossVectors(right, finalDir).normalize();
                finalDir.add(right.multiplyScalar(aimLagX)).add(up.multiplyScalar(aimLagY)).normalize();
            }

            const rayOrigin = camera.position.clone();
            const rayDir = finalDir.clone().normalize();
            raycaster.set(rayOrigin, rayDir);

            const targets = [];
            enemies.forEach(enemy => {
                if (enemy.userData.isDead) return;
                enemy.traverse(child => { if (child.isMesh) targets.push(child); });
            });
            targets.push(gridFloor);
            obstacles.forEach(o => targets.push(o));

            const intersects = raycaster.intersectObjects(targets);

            if (intersects.length > 0) {
                const hit = intersects[0];
                const hitObj = hit.object;
                const point = hit.point;
                const normal = hit.face.normal.clone();
                normal.transformDirection(hitObj.matrixWorld);
                createBulletTrail(muzzlePos, point);

                if (hitObj === gridFloor) createBulletHit(point, normal);
                if (hitObj.userData.isObstacle) createBulletHit(point, normal);

                let parentGroup = null;
                let obj = hitObj;
                while (obj.parent) {
                    if (obj.parent.userData && obj.parent.userData.isEnemy) {
                        parentGroup = obj.parent; break;
                    }
                    obj = obj.parent;
                }

                if (parentGroup && !parentGroup.userData.isDead) {
                    const part = hitObj.userData.bodyPart || 'torso';
                    let damage = 0;
                    if (part === 'head') { damage = 100; }
                    else if (part === 'leg') { damage = 15; }
                    else if (part === 'torso') { damage = 25; }
                    else { damage = 15; }

                    const data = parentGroup.userData;
                    data.hp = Math.max(0, data.hp - damage);
                    data.updateHP();

                    if (enemyAIStates.has(parentGroup)) {
                        const aiState = enemyAIStates.get(parentGroup);
                        if (aiState.state !== AI_STATES.HIT) {
                            aiState.state = AI_STATES.HIT;
                            aiState.hitTimer = 0;
                        }
                    }

                    if (data.hp <= 0 && !data.isDead) {
                        data.isDead = true;
                        data.deathTimer = 0;
                        data.deathPosition.copy(parentGroup.position);
                        
                        createDeathMark(data.deathPosition);
                        parentGroup.visible = false;
                        
                        const now = performance.now() / 1000;
                        if (now - lastKillTime <= STREAK_WINDOW && lastKillTime > 0) {
                            killStreakCount++;
                        } else {
                            killStreakCount = 1;
                        }
                        lastKillTime = now;
                        updateKillUI(killStreakCount);
                    }
                }
            } else {
                const farPoint = new THREE.Vector3(0, 0, -100);
                farPoint.applyQuaternion(camera.quaternion);
                farPoint.add(camera.position);
                createBulletTrail(muzzlePos, farPoint);
            }
        }

        // ===== 动画循环 =====
        const clock = new THREE.Clock();

        function update(dt) {
            dt = Math.min(dt, 0.05);
            const moving = Math.abs(state.moveX) > 0.05 || Math.abs(state.moveZ) > 0.05;

            if (isReloading) {
                reloadTimer += dt;
                const progress = Math.min(reloadTimer / RELOAD_DURATION, 1);
                reloadFill.style.width = (progress * 100) + '%';
                if (reloadTimer >= RELOAD_DURATION) finishReload();
            }
            
            if (handMixer) handMixer.update(dt);
            if (enemyMixer) enemyMixer.update(dt);

            if (isReloading && state.isAiming) {
                state.isAiming = false;
                state.aimTransitionTime = 0;
                state.targetScale = 0.03; state.targetX = 0.00; state.targetY = -0.35; state.targetZ = 0.20;
                state.targetRotX = 0.01; state.targetRotY = -3.14; state.targetRotZ = 0.01;
            }

            if (state.isAiming || state.aimTransitionTime < state.aimDuration) {
                state.aimTransitionTime += dt;
                const p = Math.min(state.aimTransitionTime / state.aimDuration, 1.0);
                const ease = 1 - Math.pow(1 - p, 3);
                state.currentScale += (state.targetScale - state.currentScale) * ease;
                state.currentX += (state.targetX - state.currentX) * ease;
                state.currentY += (state.targetY - state.currentY) * ease;
                state.currentZ += (state.targetZ - state.currentZ) * ease;
                state.currentRotX += (state.targetRotX - state.currentRotX) * ease;
                state.currentRotY += (state.targetRotY - state.currentRotY) * ease;
                state.currentRotZ += (state.targetRotZ - state.currentRotZ) * ease;
            }
            if (handGroup.children.length > 0) {
                const model = handGroup.children[0];
                model.scale.setScalar(state.currentScale);
                model.position.set(state.currentX, state.currentY, state.currentZ);
                model.rotation.set(state.currentRotX, state.currentRotY, state.currentRotZ);
            }

            if (!isReloading && state.isAiming && state.aimTransitionTime >= state.aimDuration) {
                state.fireCooldown -= dt;
                if (state.fireCooldown <= 0) {
                    performFire();
                    state.fireCooldown = state.fireRate;
                }
            } else {
                state.fireCooldown = 0;
            }

            if (moving && state.isGrounded && !state.isSliding && !state.isSlideJumping && !isReloading) {
                state.footstepTimer += dt;
                if (state.footstepTimer >= state.footstepInterval) {
                    state.footstepTimer = 0;
                    sound.playFootstep();
                }
            } else {
                state.footstepTimer = 0;
            }

            for (let i = bulletHoles.length - 1; i >= 0; i--) {
                const h = bulletHoles[i];
                if (h.userData.lifeTime !== undefined) h.userData.lifeTime -= dt;
                if (h.userData.lifeTime <= 0) {
                    scene.remove(h); h.geometry.dispose(); h.material.dispose();
                    bulletHoles.splice(i, 1);
                }
            }
            for (let i = muzzleFlashes.length - 1; i >= 0; i--) {
                const f = muzzleFlashes[i];
                f.userData.lifeTime -= dt;
                f.material.opacity -= dt * 10;
                if (f.userData.lifeTime <= 0 || f.material.opacity <= 0) {
                    scene.remove(f); f.material.map.dispose(); f.material.dispose();
                    muzzleFlashes.splice(i, 1);
                }
            }
            for (let i = bulletTrails.length - 1; i >= 0; i--) {
                const t = bulletTrails[i];
                t.userData.lifeTime -= dt;
                t.material.opacity -= dt * 8;
                if (t.userData.lifeTime <= 0 || t.material.opacity <= 0) {
                    scene.remove(t); t.geometry.dispose(); t.material.dispose();
                    bulletTrails.splice(i, 1);
                }
            }

            accuracyRecoveryTimer += dt;
            if (accuracyRecoveryTimer >= ACC_RECOVERY_TIME && playerAccuracy < ACC_MAX) {
                playerAccuracy = Math.min(ACC_MAX, playerAccuracy + ACC_RECOVERY_RATE);
                accuracyRecoveryTimer = 0;
            }

            enemies.forEach(enemy => {
                const data = enemy.userData;
                if (!enemyAIStates.has(enemy)) initAIState(enemy);
                const ai = enemyAIStates.get(enemy);

                if (data.isDead) {
                    data.deathTimer += dt;
                    if (data.deathTimer >= 2.0) {
                        data.resetTimer += dt;
                        if (data.resetTimer > 2.0) {
                            removeDeathMark();
                            data.isDead = false;
                            data.hp = data.maxHp;
                            data.deathTimer = 0;
                            data.resetTimer = 0;
                            enemy.position.set(ENEMY_SPAWN.x, footOffset, ENEMY_SPAWN.z);
                            enemy.rotation.z = 0;
                            enemy.visible = true;
                            data.updateHP();
                            if (enemyAction) {
                                enemyAction.stop();
                                enemyAction.play();
                            }
                            const newAI = initAIState(enemy);
                            newAI.retreatDir.set(0, 0, 1);
                        }
                    }
                    return;
                }

                enemy.position.y = footOffset;

                const playerPos = camera.position.clone();
                const toPlayer = new THREE.Vector3().subVectors(playerPos, enemy.position);
                const distToPlayer = toPlayer.length();
                const dirToPlayer = toPlayer.clone().normalize();
                const enemyFwd = new THREE.Vector3(0, 0, -1).applyQuaternion(enemy.quaternion);

                let canSeePlayer = false;
                if (distToPlayer <= AI_CONFIG.VISUAL_RANGE) {
                    const angleToPlayer = enemyFwd.angleTo(dirToPlayer);
                    if (angleToPlayer <= AI_CONFIG.VISUAL_ANGLE / 2) {
                        const visionRay = new THREE.Raycaster(enemy.position.clone().add(new THREE.Vector3(0, 1, 0)), dirToPlayer);
                        const visionTargets = [gridFloor, ...obstacles];
                        const visionHits = visionRay.intersectObjects(visionTargets);
                        let blocked = false;
                        for (const vh of visionHits) {
                            if (vh.distance < distToPlayer) { blocked = true; break; }
                        }
                        canSeePlayer = !blocked;
                    }
                }

                const now = performance.now() / 1000;
                if (lastGunshotPos && (now - lastGunshotTime) <= AI_CONFIG.HEAR_DELAY) {
                    const distToShot = enemy.position.distanceTo(lastGunshotPos);
                    if (distToShot <= AI_CONFIG.HEAR_RANGE && ai.state === AI_STATES.IDLE) {
                        ai.lastKnownPlayerPos = lastGunshotPos.clone();
                        ai.state = AI_STATES.ALERT;
                        ai.stateTimer = 0;
                    }
                }

                if (canSeePlayer && ai.state === AI_STATES.IDLE) {
                    const dot = enemyFwd.dot(dirToPlayer);
                    if (dot < 0.3) {
                        ai.turnTimer += dt;
                        if (ai.turnTimer >= AI_CONFIG.BACK_TURN_DELAY) {
                            ai.turnTimer = 0;
                            ai.state = AI_STATES.COMBAT;
                            ai.isPlayerVisible = true;
                            ai.lastKnownPlayerPos = playerPos.clone();
                        }
                    } else {
                        ai.turnTimer = 0;
                        ai.state = AI_STATES.COMBAT;
                        ai.isPlayerVisible = true;
                        ai.lastKnownPlayerPos = playerPos.clone();
                    }
                } else if (canSeePlayer && ai.state !== AI_STATES.HIT) {
                    ai.isPlayerVisible = true;
                    ai.lastKnownPlayerPos = playerPos.clone();
                    ai.turnTimer = 0;
                }

                switch (ai.state) {
                    case AI_STATES.IDLE: {
                        ai.stateTimer += dt;
                        ai.idleRotateTimer += dt;
                        if (ai.idleRotateTimer > 3 + Math.random() * 2) {
                            ai.idleRotateTimer = 0;
                            ai.idleRotateTargetY = enemy.rotation.y + (Math.random() - 0.5) * 1.5;
                        }
                        let rotDiff = ai.idleRotateTargetY - enemy.rotation.y;
                        if (Math.abs(rotDiff) > 0.01) {
                            enemy.rotation.y += Math.sign(rotDiff) * dt * 0.5;
                        }
                        if (canSeePlayer && distToPlayer <= AI_CONFIG.VISUAL_RANGE) {
                            ai.state = AI_STATES.COMBAT;
                            ai.isPlayerVisible = true;
                            ai.lastKnownPlayerPos = playerPos.clone();
                        }
                        break;
                    }
                    case AI_STATES.ALERT: {
                        const lookTarget = ai.lastKnownPlayerPos || playerPos;
                        const lookDir = new THREE.Vector3().subVectors(lookTarget, enemy.position).normalize();
                        const targetRot = Math.atan2(lookDir.x, lookDir.z);
                        let rotDiff = targetRot - enemy.rotation.y;
                        while (rotDiff > Math.PI) rotDiff -= Math.PI * 2;
                        while (rotDiff < -Math.PI) rotDiff += Math.PI * 2;
                        enemy.rotation.y += rotDiff * dt * 3;
                        enemy.position.x += Math.sin(now * 4) * 0.02 * dt;
                        if (canSeePlayer) {
                            ai.state = AI_STATES.COMBAT;
                            ai.isPlayerVisible = true;
                            ai.lastKnownPlayerPos = playerPos.clone();
                        } else {
                            ai.stateTimer += dt;
                            if (ai.stateTimer > 4) {
                                ai.state = AI_STATES.IDLE;
                                ai.stateTimer = 0;
                            }
                        }
                        break;
                    }
                    case AI_STATES.COMBAT: {
                        ai.isPlayerVisible = canSeePlayer;
                        if (!canSeePlayer && ai.lastKnownPlayerPos) {
                            ai.state = AI_STATES.ALERT;
                            ai.stateTimer = 0;
                            break;
                        }
                        if (canSeePlayer) ai.lastKnownPlayerPos = playerPos.clone();
                        const combatDir = new THREE.Vector3().subVectors(playerPos, enemy.position).normalize();
                        const combatTargetRot = Math.atan2(combatDir.x, combatDir.z);
                        let combatRotDiff = combatTargetRot - enemy.rotation.y;
                        while (combatRotDiff > Math.PI) combatRotDiff -= Math.PI * 2;
                        while (combatRotDiff < -Math.PI) combatRotDiff += Math.PI * 2;
                        enemy.rotation.y += combatRotDiff * dt * 5;

                        const hpRatio = data.hp / data.maxHp;
                        if (hpRatio <= AI_CONFIG.RETREAT_THRESHOLD && !ai.retreating) {
                            ai.retreating = true;
                            ai.strafeTimer = 0;
                            const retreatTarget = new THREE.Vector3(ENEMY_SPAWN.x, 0, ENEMY_SPAWN.z);
                            ai.retreatDir.subVectors(retreatTarget, enemy.position).normalize();
                            ai.retreatDir.y = 0;
                        }

                        if (ai.retreating) {
                            const retreatMove = ai.retreatDir.clone().multiplyScalar(AI_CONFIG.RETREAT_SPEED * dt);
                            const newPos = enemy.position.clone().add(retreatMove);
                            let blocked = false;
                            for (const obs of obstacles) {
                                const obsBox = new THREE.Box3().setFromObject(obs);
                                const testPos = newPos.clone();
                                testPos.y = GROUND_Y + 0.5;
                                const point = new THREE.Vector3(testPos.x, testPos.y, testPos.z);
                                if (obsBox.containsPoint(point)) { blocked = true; break; }
                            }
                            if (blocked) {
                                ai.strafeTimer += dt;
                                if (ai.strafeTimer > 0.5) {
                                    ai.strafeDir *= -1;
                                    ai.strafeTimer = 0;
                                }
                                const strafeDir = new THREE.Vector3().crossVectors(ai.retreatDir, new THREE.Vector3(0, 1, 0)).normalize();
                                enemy.position.x += strafeDir.x * ai.strafeDir * AI_CONFIG.RETREAT_SPEED * 0.5 * dt;
                                enemy.position.z += strafeDir.z * ai.strafeDir * AI_CONFIG.RETREAT_SPEED * 0.5 * dt;
                            } else {
                                enemy.position.x += retreatMove.x;
                                enemy.position.z += retreatMove.z;
                            }
                            if (distToPlayer > AI_CONFIG.VISUAL_RANGE) {
                                ai.retreating = false;
                            }
                        }

                        if (ai.shotsFired < AI_CONFIG.RELOAD_SHOT_COUNT) {
                            ai.combatFireTimer -= dt;
                            const fireInterval = ai.retreating ?
                                AI_CONFIG.RETREAT_FIRE_MIN + Math.random() * (AI_CONFIG.RETREAT_FIRE_MAX - AI_CONFIG.RETREAT_FIRE_MIN) :
                                AI_CONFIG.COMBAT_FIRE_MIN + Math.random() * (AI_CONFIG.COMBAT_FIRE_MAX - AI_CONFIG.COMBAT_FIRE_MIN);
                            if (ai.combatFireTimer <= 0) {
                                ai.combatFireTimer = fireInterval;
                                const enemyFireDir = new THREE.Vector3().subVectors(playerPos, enemy.position).normalize();
                                const enemySpread = (1 - 0.4) * 0.1;
                                const theta2 = Math.random() * Math.PI * 2;
                                const phi2 = Math.random() * enemySpread;
                                const quat2 = new THREE.Quaternion().setFromUnitVectors(
                                    new THREE.Vector3(0, 0, -1),
                                    enemyFireDir
                                );
                                const spreadVec2 = new THREE.Vector3(
                                    Math.sin(theta2) * Math.sin(phi2),
                                    Math.cos(theta2) * Math.sin(phi2),
                                    -Math.cos(phi2)
                                ).normalize();
                                spreadVec2.applyQuaternion(quat2);
                                const enemyRayOrigin = enemy.position.clone().add(new THREE.Vector3(0, 1, 0));
                                const enemyRay = new THREE.Raycaster(enemyRayOrigin, spreadVec2);
                                const enemyTargets = [gridFloor, ...obstacles];
                                const enemyHits = enemyRay.intersectObjects(enemyTargets);
                                let playerBlocked = false;
                                for (const eh of enemyHits) {
                                    if (eh.distance < distToPlayer) { playerBlocked = true; break; }
                                }
                                if (!playerBlocked) {
                                    const hitChance = 0.5;
                                    if (Math.random() < hitChance) {
                                        const dmg = Math.random() < 0.1 ? 100 : (Math.random() < 0.3 ? 25 : 15);
                                        playerHP = Math.max(0, playerHP - dmg);
                                        if (playerHP <= 0 && !isPlayerDead) {
                                            isPlayerDead = true;
                                            playerDeathTimer = 0;
                                            createDeathMark(camera.position);
                                            handGroup.visible = false;
                                        }
                                    }
                                    const trailEnd = playerPos.clone().add(new THREE.Vector3(
                                        (Math.random() - 0.5) * 0.3,
                                        (Math.random() - 0.5) * 0.3,
                                        (Math.random() - 0.5) * 0.3
                                    ));
                                    createBulletTrail(enemyRayOrigin, trailEnd);
                                }
                                ai.shotsFired++;
                            }
                        } else {
                            ai.state = AI_STATES.RELOAD;
                            ai.reloadTimer = 0;
                        }
                        break;
                    }
                    case AI_STATES.RELOAD: {
                        ai.reloadTimer += dt;
                        if (ai.reloadTimer >= AI_CONFIG.RELOAD_DURATION_AI) {
                            ai.shotsFired = 0;
                            ai.reloadTimer = 0;
                            ai.state = AI_STATES.COMBAT;
                            ai.combatFireTimer = 0.3 + Math.random() * 0.3;
                        }
                        break;
                    }
                    case AI_STATES.HIT: {
                        ai.hitTimer += dt;
                        enemy.rotation.x = -0.15 * (1 - Math.min(ai.hitTimer / 0.2, 1));
                        if (ai.hitTimer >= 0.2) {
                            enemy.rotation.x = 0;
                            if (canSeePlayer) {
                                ai.state = AI_STATES.COMBAT;
                                ai.isPlayerVisible = true;
                                ai.lastKnownPlayerPos = playerPos.clone();
                            } else {
                                ai.state = AI_STATES.ALERT;
                                ai.stateTimer = 0;
                                ai.lastKnownPlayerPos = playerPos.clone();
                            }
                        }
                        break;
                    }
                }
            });

            if (isPlayerDead && !handGroup.visible) {
                playerDeathTimer += dt;
                if (playerDeathTimer >= 2.0) {
                    removeDeathMark();
                    isPlayerDead = false;
                    playerHP = MAX_PLAYER_HP;
                    playerDeathTimer = 0;
                    camera.position.set(PLAYER_SPAWN.x, PLAYER_SPAWN.y + STAND_HEIGHT, PLAYER_SPAWN.z);
                    state.currentCamY = camera.position.y;
                    state.targetCamY = state.currentCamY;
                    state.eulerX = 0;
                    state.eulerY = 0;
                    state.moveX = 0;
                    state.moveZ = 0;
                    state.isSliding = false;
                    state.isSlideJumping = false;
                    state.jumpVel = 0;
                    state.isGrounded = true;
                    state.currentSpeed = state.baseSpeed;
                    state.bobTimer = 0;
                    if (state.isAiming) {
                        state.isAiming = false;
                        state.targetScale = 0.03; state.targetX = 0.00; state.targetY = -0.35; state.targetZ = 0.20;
                        state.targetRotX = 0.01; state.targetRotY = -3.14; state.targetRotZ = 0.01;
                    }
                    handGroup.visible = true;
                    currentAmmo = MAG_SIZE;
                    reserveAmmo = 900;
                    updateAmmoHUD();
                }
            }

            xVal.textContent = camera.position.x.toFixed(2);
            yVal.textContent = camera.position.y.toFixed(2);
            zVal.textContent = camera.position.z.toFixed(2);

            if (state.isSlideJumping) {
                state.slideJumpTime += dt;
                const progress = state.slideJumpTime / state.slideJumpDuration;
                if (progress >= 1.0) {
                    state.isSlideJumping = false; state.isGrounded = true;
                    state.currentCamY = GROUND_Y + (isCrouching ? CROUCH_HEIGHT : STAND_HEIGHT);
                    state.targetCamY = state.currentCamY;
                    state.targetTilt = 0; state.currentSpeed = state.baseSpeed;
                    camera.position.y = state.currentCamY;
                } else {
                    const heightCurve = Math.sin(progress * Math.PI) * state.slideJumpMaxHeight;
                    let speedMultiplier;
                    if (progress < 0.2) speedMultiplier = 1.0 + (progress / 0.2) * 1.0;
                    else if (progress < 0.7) speedMultiplier = 2.0;
                    else {
                        const decelProgress = (progress - 0.7) / 0.3;
                        speedMultiplier = 2.0 - decelProgress * 1.2;
                    }
                    state.currentSpeed = state.baseSpeed * speedMultiplier;
                    const distanceIncrement = state.currentSpeed * dt;
                    state.currentCamY = state.slideJumpStartY + heightCurve;
                    camera.position.y = state.currentCamY;
                    camera.position.x += state.slideJumpDirX * distanceIncrement;
                    camera.position.z += state.slideJumpDirZ * distanceIncrement;
                    state.targetTilt = 0.05 * (1 - progress);
                }
            }

            if (state.isSliding && !state.isSlideJumping) {
                state.slideDistance += state.currentSpeed * dt;
                if (state.slideDistance >= state.slideMaxDistance) {
                    state.isSliding = false; state.slideDistance = 0;
                    state.targetTilt = 0;
                    state.targetCamY = GROUND_Y + (isCrouching ? CROUCH_HEIGHT : STAND_HEIGHT);
                    state.currentSpeed = state.baseSpeed;
                }
            }
            if (state.slideCooldown > 0) state.slideCooldown -= dt;

            if (!state.isSliding && !state.isSlideJumping && state.isGrounded) {
                const speedBase = state.isAiming ? state.baseSpeedAim : state.baseSpeed;
                const crouchMult = isCrouching ? CROUCH_SPEED_MULT : 1.0;
                const targetSpd = moving ? speedBase * crouchMult : 0;
                state.currentSpeed += (targetSpd - state.currentSpeed) * 8 * dt;
            }

            if (state.isSliding && !state.isSlideJumping) {
                camera.position.x += state.slideDirX * state.currentSpeed * dt;
                camera.position.z += state.slideDirZ * state.currentSpeed * dt;
            } else if (!state.isSlideJumping && (moving || state.currentSpeed > 0.1)) {
                const fwd = new THREE.Vector3();
                camera.getWorldDirection(fwd);
                fwd.y = 0; fwd.normalize();
                const rgt = new THREE.Vector3().crossVectors(fwd, new THREE.Vector3(0, 1, 0)).normalize();
                const mv = new THREE.Vector3().addScaledVector(fwd, -state.moveZ).addScaledVector(rgt, state.moveX);
                if (mv.length() > 1) mv.normalize();
                camera.position.x += mv.x * state.currentSpeed * dt;
                camera.position.z += mv.z * state.currentSpeed * dt;
            }

            if (!state.isGrounded && !state.isSlideJumping) {
                state.jumpVel -= 35 * dt;
                state.currentCamY += state.jumpVel * dt;
                const groundHeight = GROUND_Y + (isCrouching ? CROUCH_HEIGHT : STAND_HEIGHT);
                if (state.currentCamY <= groundHeight) {
                    state.currentCamY = groundHeight;
                    state.jumpVel = 0;
                    state.isGrounded = true;
                    state.targetCamY = state.currentCamY;
                    state.slideCooldown = 0;
                }
            }

            if (!state.isSlideJumping) {
                if (state.isGrounded && !state.isSliding) {
                    state.currentCamY += (state.targetCamY - state.currentCamY) * 12 * dt;
                } else if (state.isSliding) {
                    state.currentCamY += (state.targetCamY - state.currentCamY) * 10 * dt;
                }
                camera.position.y = state.currentCamY;
            }

            state.currentTilt += (state.targetTilt - state.currentTilt) * 10 * dt;
            camera.rotation.z = state.currentTilt;
            camera.rotation.order = 'YXZ';
            camera.rotation.y = state.eulerY;
            camera.rotation.x = state.eulerX;

            if (moving && state.isGrounded && !state.isSliding && !state.isSlideJumping && !isReloading) {
                state.bobTimer += dt * 8;
                const swing = Math.sin(state.bobTimer);
                if (state.isAiming) {
                    camera.position.x += swing * 0.006;
                    camera.position.y += (1 - Math.abs(swing)) * 0.004;
                } else {
                    camera.position.x += swing * 0.025;
                    camera.position.y += (1 - Math.abs(swing)) * 0.015;
                }
            } else {
                state.bobTimer *= 0.9;
            }

            if (moving && state.isGrounded && !state.isSliding && !state.isSlideJumping && !isReloading) {
                const swing = Math.sin(state.bobTimer);
                if (state.isAiming) {
                    handGroup.position.x = 0.25 + swing * 0.008;
                    handGroup.position.y = -0.35 + (1 - Math.abs(swing)) * 0.004;
                } else {
                    handGroup.position.x = 0.25 + swing * 0.03;
                    handGroup.position.y = -0.35 + (1 - Math.abs(swing)) * 0.015;
                }
            } else {
                handGroup.position.x += (0.25 - handGroup.position.x) * 8 * dt;
                handGroup.position.y += (-0.35 - handGroup.position.y) * 8 * dt;
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            update(clock.getDelta());
            renderer.render(scene, camera);
        }
        animate();

        // 设置玩家初始位置
        camera.position.set(PLAYER_SPAWN.x, PLAYER_SPAWN.y + STAND_HEIGHT, PLAYER_SPAWN.z);

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        updateAmmoHUD();

        // 自动加载模型
        startLoadingModels();
    </script>
</body>
</html>
